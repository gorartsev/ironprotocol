const PROGRAM = generateProgram();

// ─── APP COMPONENT ──────────────────────────────────────────────────────────
function App() {
  const [state, setState] = useState(() => storage.get("iron") || { startDate: null, completed: {}, weights: {}, restDays: {} });
  const [view, setView] = useState("calendar");
  const [selWeek, setSelWeek] = useState(null);
  const [selDay, setSelDay] = useState(null);

  const save = (s) => { setState(s); storage.set("iron", s); };
  const toggle = (id) => save({...state, completed: {...state.completed, [id]: !state.completed[id]}});
  const toggleRest = (dk, id) => { const d = state.restDays[dk]||{}; save({...state, restDays: {...state.restDays, [dk]: {...d, [id]: !d[id]}}}); };
  const setWeight = (id, w) => save({...state, weights: {...state.weights, [id]: w}});

  if (!state.startDate) {
    return (<div style={S.start}>
      <h1 style={S.logo}>IRON<span style={{color:"#FF6B35"}}>PROTOCOL</span></h1>
      <p style={{color:"#666",fontSize:13,margin:"4px 0 24px"}}>16 недель силы и гипертрофии</p>
      <div style={S.startBox}>
        <div style={{color:"#aaa",fontSize:13,marginBottom:8}}>Дата старта:</div>
        <input type="date" id="startDate" defaultValue={new Date().toISOString().split("T")[0]} style={S.dateInput}/>
        <button onClick={()=>save({...state, startDate: document.getElementById("startDate").value})} style={S.startBtn}>ПОЕХАЛИ</button>
      </div>
      <div style={{color:"#444",fontSize:11,marginTop:20,textAlign:"center",lineHeight:2}}>
        <div>Zercher + OHP + 5/3/1</div>
        <div>3 дня в зале + домашняя работа</div>
        <div>Прогресс сохраняется на устройстве</div>
      </div>
    </div>);
  }

  const now = new Date();
  const start = new Date(state.startDate);
  const daysSince = Math.floor((now - start) / 86400000);
  const curWeek = Math.min(16, Math.max(1, Math.floor(daysSince/7)+1));
  const total = Object.values(PROGRAM).flatMap(w=>w.days.flatMap(d=>d.exercises)).length;
  const done = Object.values(state.completed).filter(Boolean).length;
  const pct = total > 0 ? (done/total*100) : 0;

  // ── Day view ──
  if (view === "day" && selWeek && selDay !== null) {
    const wd = PROGRAM[selWeek].days[selDay];
    const ph = getPhase(selWeek);
    const allDone = wd.exercises.every(e => state.completed[e.id]);
    return (<div style={S.wrap}>
      <div style={S.topBar}>
        <button onClick={()=>{setView("calendar");setSelDay(null)}} style={S.back}>← Назад</button>
        <span style={{...S.badge, background: ph.color}}>{ph.name}</span>
      </div>
      <div style={S.dayHead}>
        <div style={{fontSize:11,color:"#666",letterSpacing:1}}>НЕДЕЛЯ {selWeek}</div>
        <h2 style={{margin:"2px 0",fontSize:19,color:"#fff"}}>{wd.dayName}</h2>
        <div style={{fontSize:13,color:"#FF6B35",fontWeight:600}}>{wd.title}</div>
        {allDone && <div style={S.doneBadge}>✓ ВЫПОЛНЕНО</div>}
      </div>
      <div style={{padding:"6px 12px"}}>
        {wd.exercises.map(ex => {
          const d = state.completed[ex.id];
          return (<div key={ex.id} style={{...S.card, opacity:d?0.55:1, borderLeftColor: TIER_COLORS[ex.tier]}}>
            <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
              <button onClick={()=>toggle(ex.id)} style={{...S.chk, background:d?TIER_COLORS[ex.tier]:"transparent", borderColor:TIER_COLORS[ex.tier]}}>{d?"✓":""}</button>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:600,color:"#e0e0e0"}}>{ex.name}</div>
                <div style={{display:"flex",gap:8,marginTop:3,flexWrap:"wrap"}}>
                  <span style={{fontSize:10,fontWeight:800,color:TIER_COLORS[ex.tier]}}>{ex.tier}</span>
                  <span style={{fontSize:12,color:"#aaa",fontWeight:600}}>{ex.sets}</span>
                  <span style={{fontSize:11,color:"#777"}}>RPE {ex.rpe}</span>
                </div>
                {ex.note && <div style={{fontSize:11,color:"#FF9800",marginTop:2,fontStyle:"italic"}}>{ex.note}</div>}
              </div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8,marginTop:6,paddingTop:5,borderTop:"1px solid #1e1e1e"}}>
              <span style={{fontSize:11,color:"#555"}}>Вес:</span>
              <input type="number" inputMode="decimal" value={state.weights[ex.id]||""} onChange={e=>setWeight(ex.id,e.target.value)} placeholder="—" style={S.wInput}/>
              <span style={{fontSize:11,color:"#555"}}>кг</span>
            </div>
          </div>);
        })}
      </div>
    </div>);
  }

  // ── Rest day view ──
  if (view === "restday") {
    const rk = `rest-w${selWeek}-d${selDay}`;
    const rd = state.restDays[rk]||{};
    const rNames = ["Вторник","Четверг","Суббота","Воскресенье"];
    return (<div style={S.wrap}>
      <div style={S.topBar}>
        <button onClick={()=>{setView("calendar");setSelDay(null)}} style={S.back}>← Назад</button>
        <span style={{...S.badge,background:"#333"}}>ДЕНЬ ОТДЫХА</span>
      </div>
      <div style={S.dayHead}>
        <div style={{fontSize:11,color:"#666",letterSpacing:1}}>НЕДЕЛЯ {selWeek}</div>
        <h2 style={{margin:"2px 0",fontSize:19,color:"#fff"}}>{rNames[selDay]||"Отдых"}</h2>
        <div style={{fontSize:13,color:"#4CAF50",fontWeight:600}}>Домашняя работа (15-20 мин)</div>
      </div>
      <div style={{padding:"6px 12px"}}>
        {REST_DAY_EXERCISES.map(ex => {
          const d = rd[ex.id];
          return (<div key={ex.id} style={{...S.card, opacity:d?0.55:1, borderLeftColor:"#4CAF50"}}>
            <div style={{display:"flex",gap:10,alignItems:"center"}}>
              <button onClick={()=>toggleRest(rk,ex.id)} style={{...S.chk, background:d?"#4CAF50":"transparent", borderColor:"#4CAF50"}}>{d?"✓":""}</button>
              <div>
                <div style={{fontSize:13,fontWeight:600}}>{ex.name}</div>
                <div style={{fontSize:12,color:"#aaa",marginTop:2}}>{ex.sets}</div>
              </div>
            </div>
          </div>);
        })}
      </div>
    </div>);
  }

  // ── Calendar ──
  return (<div style={S.wrap}>
    <div style={{padding:"16px 16px 10px",borderBottom:"1px solid #1a1a1a"}}>
      <h1 style={{fontSize:21,fontWeight:900,letterSpacing:2,margin:0,color:"#fff"}}>IRON<span style={{color:"#FF6B35"}}>PROTOCOL</span></h1>
      <div style={{display:"flex",gap:16,marginTop:10}}>
        <div style={S.statBox}><div style={S.statN}>{curWeek}</div><div style={S.statL}>неделя</div></div>
        <div style={S.statBox}><div style={S.statN}>{done}</div><div style={S.statL}>сделано</div></div>
        <div style={S.statBox}><div style={S.statN}>{Math.round(pct)}%</div><div style={S.statL}>прогресс</div></div>
      </div>
      <div style={{height:4,background:"#222",borderRadius:2,marginTop:10,overflow:"hidden"}}>
        <div style={{height:"100%",width:pct+"%",background:"#FF6B35",borderRadius:2,transition:"width .4s"}}/>
      </div>
    </div>

    <div style={{padding:"6px 10px"}}>
      {Array.from({length:16},(_,i)=>i+1).map(wn => {
        const ph = getPhase(wn);
        const wd = PROGRAM[wn];
        const isCur = wn === curWeek;
        const wEx = wd.days.flatMap(d=>d.exercises);
        const wDone = wEx.filter(e=>state.completed[e.id]).length;
        const wAll = wEx.length;
        const showPH = PHASES.some(p=>p.weeks[0]===wn);
        const curPH = PHASES.find(p=>p.weeks[0]===wn);

        const weekDays = [
          {l:"Пн",type:"t",idx:0},{l:"Вт",type:"r",idx:0},
          {l:"Ср",type:"t",idx:1},{l:"Чт",type:"r",idx:1},
          {l:"Пт",type:"t",idx:2},{l:"Сб",type:"r",idx:2},
          {l:"Вс",type:"r",idx:3},
        ];

        return (<div key={wn}>
          {showPH && <div style={{padding:"8px 6px 2px",marginTop:6,borderLeft:`3px solid ${curPH.color}`,fontSize:11,fontWeight:700,letterSpacing:2,color:curPH.color}}>{curPH.name}</div>}
          <div style={{border:`1px solid ${isCur?"#FF6B35":"#222"}`,borderRadius:8,padding:"8px 8px 6px",marginTop:4,background:isCur?"#1a1510":"#111"}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
              <span style={{fontWeight:700,fontSize:13,color:ph.color}}>W{wn}</span>
              <span style={{fontSize:11,color:"#555"}}>{wDone}/{wAll}</span>
            </div>
            <div style={{display:"flex",gap:3}}>
              {weekDays.map((d,i) => {
                if (d.type === "t") {
                  const day = wd.days[d.idx];
                  if (!day) return null;
                  const dd = day.exercises.filter(e=>state.completed[e.id]).length;
                  const dc = dd === day.exercises.length;
                  return (<button key={i} onClick={()=>{setSelWeek(wn);setSelDay(d.idx);setView("day")}}
                    style={{...S.dayCell, background:dc?ph.color+"33":"#1a1a1a", borderColor:dc?ph.color:"#333"}}>
                    <div style={{fontSize:10,fontWeight:700,color:"#ddd"}}>{d.l}</div>
                    <div style={{fontSize:10,color:ph.color,marginTop:1}}>{dd}/{day.exercises.length}</div>
                  </button>);
                } else {
                  const rk=`rest-w${wn}-d${d.idx}`;
                  const rd=state.restDays[rk]||{};
                  const rdd=REST_DAY_EXERCISES.filter(e=>rd[e.id]).length;
                  const rdc=rdd===REST_DAY_EXERCISES.length;
                  return (<button key={i} onClick={()=>{setSelWeek(wn);setSelDay(d.idx);setView("restday")}}
                    style={{...S.dayCell, background:rdc?"#1a2a20":"#0f0f0f", borderColor:rdc?"#4CAF50":"#222"}}>
                    <div style={{fontSize:10,fontWeight:600,color:"#777"}}>{d.l}</div>
                    <div style={{fontSize:10,color:rdd>0?"#4CAF50":"#333",marginTop:1}}>{rdd>0?`${rdd}/6`:"—"}</div>
                  </button>);
                }
              })}
            </div>
          </div>
        </div>);
      })}
    </div>
    <button onClick={()=>{if(confirm("Сбросить весь прогресс?"))save({startDate:null,completed:{},weights:{},restDays:{}})}} style={{display:"block",margin:"16px auto",background:"none",border:"1px solid #333",color:"#555",padding:"8px 16px",borderRadius:6,fontSize:11,fontFamily:"inherit"}}>Сбросить прогресс</button>
    <div style={{height:40}}/>
  </div>);
}
