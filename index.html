  };
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth={stroke} strokeLinecap="round" strokeLinejoin="round" style={{display:"block"}}>
      {paths[name]}
    </svg>
  );
};

// ═══ APP ═════════════════════════════════════════════════════════════════════
function App() {
  const [state, setState] = useState(() => {
    const s = storage.get("ironv4");
    return {
      startDate: s?.startDate || null,
      completed: s?.completed || {},
      weights: s?.weights || {},
      rest: s?.rest || {},
    };
  });
  const [view, setView] = useState("home");
  const [selW, setSelW] = useState(null);
  const [selD, setSelD] = useState(null);

  const save = (s) => { setState(s); storage.set("ironv4", s); };
  const toggle = (id) => save({...state, completed: {...state.completed, [id]: !state.completed[id]}});
  const toggleRest = (k, id) => { const d = state.rest[k] || {}; save({...state, rest: {...state.rest, [k]: {...d, [id]: !d[id]}}}); };
  const setW = (id, v) => save({...state, weights: {...state.weights, [id]: v}});

  if (!state.startDate) {
    return <Start onStart={(d) => save({...state, startDate: d})} />;
  }

  const now = new Date();
  const start = new Date(state.startDate);
  const daysSince = Math.floor((now - start) / 86400000);
  const curWeek = Math.min(10, Math.max(1, Math.floor(daysSince/7) + 1));
  const dayOfWeek = now.getDay(); // 0=Sun, 1=Mon ... 6=Sat

  // Training days = Mon-Sat (dayOfWeek 1-6) → slot 0-5
  // Sunday (0) = rest
  const isTrainingToday = dayOfWeek >= 1 && dayOfWeek <= 6;
  const isRestToday = dayOfWeek === 0;
  const todayDayIdx = isTrainingToday ? dayOfWeek - 1 : null;

  const allEx = Object.values(PROG).flatMap(w => w.days.flatMap(d => d.ex));
  const totalDone = Object.values(state.completed).filter(Boolean).length;

  // ═══ EXERCISE DAY VIEW ══════════════════════════════════════════════════
  if (view === "day" && selW !== null && selD !== null) {
    const wd = PROG[selW].days[selD];
    const ph = getPhase(selW);
    const doneCount = wd.ex.filter(e => state.completed[e.id]).length;
    const allDone = doneCount === wd.ex.length;
    const dowForSlot = SLOT_TO_DOW[selD];

    return (
      <div style={sc}>
        <TopBar onBack={() => setView("home")}/>

        <div style={{padding:`${SP.xl}px ${SP.xl}px 0`}}>
          <h1 className="tbig" style={{
            fontSize: 52,
            color: C.text,
            margin: 0,
            textTransform: "uppercase",
            lineHeight: 0.9
          }}>
            {DAY_NAMES_FULL[dowForSlot]}
          </h1>
          <div style={{
            fontSize: 13,
            color: C.textDim,
            marginTop: SP.sm,
            fontWeight: 500,
            letterSpacing: 0.2
          }}>
            W{selW} · {ph.short} · <span style={{color: C.accent, fontWeight: 700}}>{wd.name}</span>
          </div>

          <div style={{marginTop: SP.lg, display: "flex", alignItems: "center", gap: SP.md}}>
            <div style={{flex: 1, height: 3, background: C.border, borderRadius: 2, overflow: "hidden"}}>
              <div style={{
                height: "100%",
                width: `${(doneCount/wd.ex.length)*100}%`,
                background: allDone ? C.text : C.accent,
                transition: "width .4s"
              }}/>
            </div>
            <div style={{
              fontSize: 13,
              color: C.textDim,
              fontWeight: 700,
              fontVariantNumeric: "tabular-nums",
              minWidth: 40,
              textAlign: "right"
            }}>
              {doneCount}/{wd.ex.length}
            </div>
          </div>

          {allDone && (
            <div style={{
              marginTop: SP.md,
              display: "inline-flex",
              alignItems: "center",
              gap: 6,
              padding: "5px 10px",
              background: C.text,
              color: C.bg,
              fontSize: 10,
              fontWeight: 800,
              letterSpacing: 1.5,
              textTransform: "uppercase"
            }}>
              <Icon name="check" size={12} color={C.bg} stroke={3}/>
              ВЫПОЛНЕНО
            </div>
          )}
        </div>

        <div style={{padding: `${SP.xl}px ${SP.xl}px ${SP.xxxl}px`, display: "flex", flexDirection: "column", gap: SP.xs}}>
          {wd.ex.map(ex => {
            const d = state.completed[ex.id];
            return (
              <div key={ex.id} style={{
                display: "flex",
                alignItems: "flex-start",
                gap: SP.md,
                padding: `${SP.md}px 0`,
                borderBottom: `1px solid ${C.border}`,
                opacity: d ? 0.4 : 1,
                transition: "opacity .2s"
              }}>
                <button onClick={() => toggle(ex.id)} style={{
                  width: 22, height: 22, minWidth: 22,
                  border: `1.5px solid ${d ? C.text : C.textDim}`,
                  background: d ? C.text : "transparent",
                  display: "flex", alignItems: "center", justifyContent: "center",
                  marginTop: 4, flexShrink: 0,
                  borderRadius: 3,
                  transition: "all .15s"
                }}>
                  {d && <Icon name="check" size={12} color={C.bg} stroke={3}/>}
                </button>
                <div style={{flex: 1, minWidth: 0}}>
                  <div style={{
                    fontSize: 15,
                    fontWeight: 700,
                    color: C.text,
                    lineHeight: 1.3,
                    textDecoration: d ? "line-through" : "none",
                    textDecorationColor: C.accent,
                    textDecorationThickness: "2px"
                  }}>
                    {ex.n}
                  </div>
                  <div style={{
                    display: "flex",
                    gap: SP.md,
                    marginTop: 4,
                    fontSize: 12,
                    color: C.textDim,
                    fontVariantNumeric: "tabular-nums",
                    flexWrap: "wrap"
                  }}>
                    {ex.t && <span style={{fontWeight: 800, color: ex.t === "T1" ? C.text : C.textDim, letterSpacing: 0.5}}>{ex.t}</span>}
                    {ex.s && <span style={{fontWeight: 600}}>{ex.s}</span>}
                    {ex.r && <span>RPE {ex.r}</span>}
                  </div>
                  {ex.note && (
                    <div style={{
                      fontSize: 11,
                      color: C.accent,
                      marginTop: 4,
                      fontWeight: 700,
                      fontStyle: "italic"
                    }}>
                      → {ex.note}
                    </div>
                  )}
                  <div style={{display: "flex", alignItems: "center", gap: 6, marginTop: 8}}>
                    <span style={{fontSize: 10, color: C.textSoft, fontWeight: 600, textTransform: "uppercase", letterSpacing: 1}}>Вес</span>
                    <input
                      type="number"
                      inputMode="decimal"
                      value={state.weights[ex.id] || ""}
                      onChange={e => setW(ex.id, e.target.value)}
                      placeholder="—"
                      style={{
                        width: 60,
                        background: "transparent",
                        border: "none",
                        borderBottom: `1.5px solid ${C.border}`,
                        color: C.text,
                        padding: "3px 4px",
                        fontSize: 14,
                        fontWeight: 700,
                        textAlign: "left",
                        fontVariantNumeric: "tabular-nums",
                        outline: "none"
                      }}
                    />
                    <span style={{fontSize: 11, color: C.textSoft, fontWeight: 500}}>кг</span>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  // ═══ SUNDAY REST VIEW ═════════════════════════════════════════════════
  if (view === "rest") {
    const rk = `rest-${curWeek}`;
    const rdata = state.rest[rk] || {};
    const doneCount = REST_EX.filter(e => rdata[e.id]).length;
    const allDone = doneCount === REST_EX.length;

    return (
      <div style={sc}>
        <TopBar onBack={() => setView("home")}/>

        <div style={{padding:`${SP.xl}px ${SP.xl}px 0`}}>
          <h1 className="tbig" style={{
            fontSize: 52,
            color: C.text,
            margin: 0,
            textTransform: "uppercase"
          }}>
            ВОСКРЕСЕНЬЕ
          </h1>
          <div style={{fontSize: 13, color: C.textDim, marginTop: SP.sm, fontWeight: 500}}>
            W{curWeek} · <span style={{color: C.rest, fontWeight: 700}}>ПОЛНЫЙ ОТДЫХ</span> · восстановление
          </div>

          <div style={{marginTop: SP.lg, display: "flex", alignItems: "center", gap: SP.md}}>
            <div style={{flex: 1, height: 3, background: C.border, borderRadius: 2, overflow: "hidden"}}>
              <div style={{
                height: "100%",
                width: `${(doneCount/REST_EX.length)*100}%`,
                background: C.rest,
                transition: "width .4s"
              }}/>
            </div>
            <div style={{
              fontSize: 13,
              color: C.textDim,
              fontWeight: 700,
              fontVariantNumeric: "tabular-nums",
              minWidth: 40,
              textAlign: "right"
            }}>
              {doneCount}/{REST_EX.length}
            </div>
          </div>
        </div>

        <div style={{padding: `${SP.xl}px ${SP.xl}px ${SP.xxxl}px`, display: "flex", flexDirection: "column"}}>
          {REST_EX.map(ex => {
            const d = rdata[ex.id];
            return (
              <div key={ex.id} style={{
                display: "flex",
                alignItems: "center",
                gap: SP.md,
                padding: `${SP.md}px 0`,
                borderBottom: `1px solid ${C.border}`,
                opacity: d ? 0.4 : 1
              }}>
                <button onClick={() => toggleRest(rk, ex.id)} style={{
                  width: 22, height: 22,
                  border: `1.5px solid ${d ? C.rest : C.textDim}`,
                  background: d ? C.rest : "transparent",
                  display: "flex", alignItems: "center", justifyContent: "center",
                  flexShrink: 0,
                  borderRadius: 3
                }}>
                  {d && <Icon name="check" size={12} color="#fff" stroke={3}/>}
                </button>
                <div style={{flex: 1}}>
                  <div style={{
                    fontSize: 15,
                    fontWeight: 700,
                    color: C.text,
                    textDecoration: d ? "line-through" : "none",
                    textDecorationColor: C.rest,
                    textDecorationThickness: "2px"
                  }}>
                    {ex.n}
                  </div>
                  <div style={{fontSize: 12, color: C.textDim, marginTop: 2, fontWeight: 600}}>{ex.s}</div>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  // ═══ CALENDAR VIEW (all 10 weeks) ══════════════════════════════════════
  if (view === "calendar") {
    return (
      <div style={sc}>
        <TopBar onBack={() => setView("home")} title="ПРОГРАММА"/>

        <div style={{padding: `${SP.lg}px ${SP.xl}px 0`}}>
          <h1 className="tbig" style={{fontSize: 48, color: C.text, margin: 0, textTransform: "uppercase"}}>
            10 НЕДЕЛЬ
          </h1>
          <div style={{fontSize: 13, color: C.textDim, marginTop: SP.sm, fontWeight: 500}}>
            Upper/Lower · 6 дней · Elevate Gym
          </div>
        </div>

        <div style={{padding: `${SP.xl}px ${SP.xl}px ${SP.xxxl}px`}}>
          {PHASES.map(phase => (
            <div key={phase.name} style={{marginBottom: SP.xl}}>
              <div style={{
                display: "flex",
                alignItems: "baseline",
                justifyContent: "space-between",
                marginBottom: SP.md,
                paddingBottom: SP.sm,
                borderBottom: `2px solid ${C.text}`
              }}>
                <div className="tbig" style={{fontSize: 20, textTransform: "uppercase", color: C.text}}>
                  {phase.name}
                </div>
                <div style={{fontSize: 11, color: C.textDim, fontWeight: 700, letterSpacing: 1}}>
                  W{phase.weeks.join(",")}
                </div>
              </div>

              {phase.weeks.map(wn => {
                const wd = PROG[wn];
                const isCur = wn === curWeek;
                const wEx = wd.days.flatMap(d => d.ex);
                const done = wEx.filter(e => state.completed[e.id]).length;
                const total = wEx.length;
                const allDone = done === total && total > 0;

                return (
                  <div key={wn} style={{
                    padding: `${SP.md}px 0`,
                    borderBottom: `1px solid ${C.border}`
                  }}>
                    <div style={{display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: SP.sm}}>
                      <div style={{display: "flex", alignItems: "baseline", gap: SP.sm}}>
                        <div className="tbig" style={{fontSize: 28, color: isCur ? C.accent : C.text, fontVariantNumeric: "tabular-nums"}}>
                          W{wn}
                        </div>
                        {isCur && (
                          <div style={{
                            fontSize: 9, fontWeight: 800, letterSpacing: 1.5,
                            color: C.accent, textTransform: "uppercase"
                          }}>
                            СЕЙЧАС
                          </div>
                        )}
                      </div>
                      <div style={{
                        fontSize: 12, fontWeight: 700,
                        color: allDone ? C.text : C.textDim,
                        fontVariantNumeric: "tabular-nums"
                      }}>
                        {done}/{total}
                      </div>
                    </div>

                    <WeekDotsRow
                      week={wn}
                      state={state}
                      onSelect={(type, i) => { setSelW(wn); setSelD(i); setView(type); }}
                      todayDow={isCur ? dayOfWeek : null}
                    />
                  </div>
                );
              })}
            </div>
          ))}
        </div>
      </div>
    );
  }

  // ═══ HOME VIEW ═══════════════════════════════════════════════════════════
  const phase = getPhase(curWeek);
  const todayDay = isTrainingToday ? PROG[curWeek].days[todayDayIdx] : null;
  const todayDone = todayDay ? todayDay.ex.filter(e => state.completed[e.id]).length : 0;
  const todayTotal = todayDay ? todayDay.ex.length : 0;

  const todayRestKey = isRestToday ? `rest-${curWeek}` : null;
  const todayRestData = todayRestKey ? (state.rest[todayRestKey] || {}) : {};
  const todayRestDone = REST_EX.filter(e => todayRestData[e.id]).length;

  const today = new Date();
  const todayStr = `${today.getDate()} ${MONTHS_RU[today.getMonth()]} ${today.getFullYear()}`;

  return (
    <div style={sc}>
      <div style={{padding: `${SP.xl}px ${SP.xl}px ${SP.lg}px`}}>
        <div style={{display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: SP.md}}>
          <div style={{flex: 1, minWidth: 0}}>
            <h1 className="tbig" style={{
              fontSize: 52,
              color: C.text,
              margin: 0,
              textTransform: "uppercase",
              lineHeight: 0.85
            }}>
              {DAY_NAMES_FULL[dayOfWeek]}
            </h1>
            <div style={{
              fontSize: 13,
              color: C.textDim,
              marginTop: SP.md,
              fontWeight: 500,
              letterSpacing: 0.2
            }}>
              {todayStr} <span style={{color: C.textSoft}}>·</span> W{curWeek}/10 <span style={{color: C.textSoft}}>·</span> <span style={{color: isTrainingToday ? C.accent : C.rest, fontWeight: 700}}>{phase.short}</span>
            </div>
          </div>
          <button onClick={() => setView("calendar")} style={{
            width: 40, height: 40,
            borderRadius: 10,
            background: C.text,
            color: C.bg,
            display: "flex", alignItems: "center", justifyContent: "center",
            flexShrink: 0
          }}>
            <Icon name="calendar" size={18} color={C.bg}/>
          </button>
        </div>
      </div>

      {/* TODAY'S TRAINING */}
      {isTrainingToday && todayDay && (
        <div style={{padding: `0 ${SP.xl}px`, marginBottom: SP.xl}}>
          <button onClick={() => { setSelW(curWeek); setSelD(todayDayIdx); setView("day"); }}
            style={{
              width: "100%",
              display: "flex",
              flexDirection: "column",
              alignItems: "flex-start",
              background: "transparent",
              padding: 0,
              textAlign: "left"
            }}>
            {todayDay.ex.slice(0, 7).map((ex) => {
              const d = state.completed[ex.id];
              return (
                <div key={ex.id} style={{
                  display: "flex",
                  alignItems: "center",
                  gap: SP.md,
                  padding: "9px 0",
                  width: "100%"
                }}>
                  <div style={{
                    width: 18, height: 18,
                    border: `1.5px solid ${d ? C.accent : C.textDim}`,
                    background: d ? C.accent : "transparent",
                    display: "flex", alignItems: "center", justifyContent: "center",
                    flexShrink: 0,
                    borderRadius: 3
                  }}>
                    {d && <Icon name="check" size={11} color="#fff" stroke={3}/>}
                  </div>
                  <div style={{
                    fontSize: 15,
                    fontWeight: 600,
                    color: d ? C.textDim : C.text,
                    textDecoration: d ? "line-through" : "none",
                    textDecorationColor: C.accent,
                    textDecorationThickness: "2px",
                    flex: 1,
                    overflow: "hidden",
                    textOverflow: "ellipsis",
                    whiteSpace: "nowrap"
                  }}>
                    {ex.n}
                  </div>
                  <div style={{
                    fontSize: 10,
                    color: C.textSoft,
                    fontWeight: 700,
                    fontVariantNumeric: "tabular-nums"
                  }}>
                    {ex.s || "—"}
                  </div>
                </div>
              );
            })}

            {todayDay.ex.length > 7 && (
              <div style={{fontSize: 11, color: C.textSoft, padding: "4px 0", fontWeight: 600}}>
                +{todayDay.ex.length - 7} ещё упражнений
              </div>
            )}

            <div style={{
              marginTop: SP.md,
              paddingTop: SP.md,
              borderTop: `1px solid ${C.border}`,
              width: "100%",
              display: "flex",
              alignItems: "center",
              justifyContent: "space-between"
            }}>
              <div style={{fontSize: 11, color: C.textSoft, fontWeight: 700, letterSpacing: 1, textTransform: "uppercase"}}>
                {todayDone}/{todayTotal} · {todayDay.name}
              </div>
              <Icon name="chevron" size={14} color={C.textSoft} stroke={2.5}/>
            </div>
          </button>
        </div>
      )}

      {isRestToday && (
        <div style={{padding: `0 ${SP.xl}px`, marginBottom: SP.xl}}>
          <button onClick={() => setView("rest")}
            style={{
              width: "100%",
              display: "flex",
              flexDirection: "column",
              alignItems: "flex-start",
              background: "transparent",
              padding: 0,
              textAlign: "left"
            }}>
            {REST_EX.map(ex => {
              const d = todayRestData[ex.id];
              return (
                <div key={ex.id} style={{
                  display: "flex",
                  alignItems: "center",
                  gap: SP.md,
                  padding: "9px 0",
                  width: "100%"
                }}>
                  <div style={{
                    width: 18, height: 18,
                    border: `1.5px solid ${d ? C.rest : C.textDim}`,
                    background: d ? C.rest : "transparent",
                    display: "flex", alignItems: "center", justifyContent: "center",
                    flexShrink: 0,
                    borderRadius: 3
                  }}>
                    {d && <Icon name="check" size={11} color="#fff" stroke={3}/>}
                  </div>
                  <div style={{
                    fontSize: 15,
                    fontWeight: 600,
                    color: d ? C.textDim : C.text,
                    textDecoration: d ? "line-through" : "none",
                    textDecorationColor: C.rest,
                    textDecorationThickness: "2px",
                    flex: 1
                  }}>
                    {ex.n}
                  </div>
                  <div style={{
                    fontSize: 11,
                    color: C.textSoft,
                    fontWeight: 600,
                    fontVariantNumeric: "tabular-nums"
                  }}>
                    {ex.s}
                  </div>
                </div>
              );
            })}
            <div style={{
              marginTop: SP.md,
              paddingTop: SP.md,
              borderTop: `1px solid ${C.border}`,
              width: "100%",
              display: "flex",
              alignItems: "center",
              justifyContent: "space-between"
            }}>
              <div style={{fontSize: 11, color: C.textSoft, fontWeight: 700, letterSpacing: 1, textTransform: "uppercase"}}>
                {todayRestDone}/{REST_EX.length} · ПОЛНЫЙ ОТДЫХ
              </div>
              <Icon name="chevron" size={14} color={C.textSoft} stroke={2.5}/>
            </div>
          </button>
        </div>
      )}

      {/* WEEK DAYS STRIP — layered gradient strips like reference */}
      <div style={{marginTop: SP.md}}>
        {[
          { dow: 1, idx: 0, label: "ПОНЕДЕЛЬНИК" },
          { dow: 2, idx: 1, label: "ВТОРНИК" },
          { dow: 3, idx: 2, label: "СРЕДА" },
          { dow: 4, idx: 3, label: "ЧЕТВЕРГ" },
          { dow: 5, idx: 4, label: "ПЯТНИЦА" },
          { dow: 6, idx: 5, label: "СУББОТА" },
          { dow: 0, idx: -1, label: "ВОСКРЕСЕНЬЕ", isRest: true },
        ].filter(d => d.dow !== dayOfWeek).map((d, i) => {
          const shade = 238 - (i * 5);
          const bg = `rgb(${shade}, ${shade - 2}, ${shade - 6})`;

          let itemCount = 0;
          let itemDone = 0;

          if (d.isRest) {
            const rk = `rest-${curWeek}`;
            const rd = state.rest[rk] || {};
            itemCount = REST_EX.length;
            itemDone = REST_EX.filter(e => rd[e.id]).length;
          } else {
            const day = PROG[curWeek].days[d.idx];
            if (day) {
              itemCount = day.ex.length;
              itemDone = day.ex.filter(e => state.completed[e.id]).length;
            }
          }
          const isComplete = itemDone === itemCount && itemCount > 0;

          return (
            <button key={d.dow} onClick={() => {
              if (d.isRest) {
                setView("rest");
              } else {
                setSelW(curWeek);
                setSelD(d.idx);
                setView("day");
              }
            }} style={{
              width: "100%",
              background: bg,
              padding: `22px ${SP.xl}px`,
              textAlign: "left",
              display: "flex",
              alignItems: "center",
              justifyContent: "space-between",
              gap: SP.md,
              border: "none"
            }}>
              <div className="tbig" style={{
                fontSize: 26,
                color: C.text,
                textTransform: "uppercase"
              }}>
                {d.label}
              </div>
              <div style={{display: "flex", alignItems: "center", gap: SP.md}}>
                {isComplete && (
                  <div style={{
                    width: 6, height: 6, borderRadius: 3,
                    background: d.isRest ? C.rest : C.text
                  }}/>
                )}
                <div style={{
                  fontSize: 11,
                  color: C.textDim,
                  fontWeight: 700,
                  fontVariantNumeric: "tabular-nums",
                  letterSpacing: 0.5
                }}>
                  {itemDone}/{itemCount}
                </div>
              </div>
            </button>
          );
        })}
      </div>

      <div style={{padding: SP.xl, textAlign: "center"}}>
        <button
          onClick={() => { if(confirm("Сбросить весь прогресс?")) save({startDate:null, completed:{}, weights:{}, rest:{}}); }}
          style={{
            background:"transparent",
            color: C.textSoft,
            padding: "8px 16px",
            fontSize: 11,
            fontWeight: 500,
            textTransform: "uppercase",
            letterSpacing: 1
          }}>
          сбросить прогресс
        </button>
      </div>
    </div>
  );
}

// ═══ WEEK DOTS ROW ══════════════════════════════════════════════════════════
function WeekDotsRow({ week, state, onSelect, todayDow }) {
  const days = [
    { dow: 1, idx: 0, letter: "П" },
    { dow: 2, idx: 1, letter: "В" },
    { dow: 3, idx: 2, letter: "С" },
    { dow: 4, idx: 3, letter: "Ч" },
    { dow: 5, idx: 4, letter: "П" },
    { dow: 6, idx: 5, letter: "С" },
    { dow: 0, idx: -1, letter: "В", isRest: true },
  ];

  return (
    <div style={{display: "flex", gap: 6, alignItems: "center"}}>
      {days.map(d => {
        const isToday = d.dow === todayDow;
        let isDone = false;
        let hasProgress = false;

        if (d.isRest) {
          const rk = `rest-${week}`;
          const rd = state.rest[rk] || {};
          const done = REST_EX.filter(e => rd[e.id]).length;
          isDone = done === REST_EX.length;
          hasProgress = done > 0;
        } else {
          const day = PROG[week].days[d.idx];
          if (day) {
            const done = day.ex.filter(e => state.completed[e.id]).length;
            isDone = done === day.ex.length;
            hasProgress = done > 0;
          }
        }

        let dotBg, dotBorder;
        if (isToday) {
          dotBg = C.accent; dotBorder = C.accent;
        } else if (isDone) {
          dotBg = d.isRest ? C.rest : C.text;
          dotBorder = dotBg;
        } else if (hasProgress) {
          dotBg = C.textSoft; dotBorder = C.textSoft;
        } else {
          dotBg = "transparent"; dotBorder = C.border;
        }

        return (
          <button key={d.dow} onClick={() => d.isRest ? null : onSelect("day", d.idx)}
            style={{
              width: 26, height: 26,
              borderRadius: "50%",
              background: dotBg,
              border: `1.5px solid ${dotBorder}`,
              display: "flex",
              alignItems: "center",
              justifyContent: "center",
              fontSize: 10,
              fontWeight: 800,
              color: (isDone || isToday) ? "#fff" : C.textDim,
              cursor: d.isRest ? "default" : "pointer",
              flex: "0 0 auto"
            }}>
            {d.letter}
          </button>
        );
      })}
    </div>
  );
}

// ═══ TOP BAR ═══════════════════════════════════════════════════════════════
