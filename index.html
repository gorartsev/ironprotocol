const Icon = ({ name, size = 20, color = "currentColor", stroke = 2 }) => {
  const paths = {
    back: <><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></>,
    calendar: <><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></>,

    chevron: <polyline points="9 18 15 12 9 6"/>,
  };
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth={stroke} strokeLinecap="round" strokeLinejoin="round" style={{display:"block"}}>
      {paths[name]}
    </svg>
  );
};

// ═══ CIRCLE PROGRESS ═════════════════════════════════════════════════════════
function CircleProgress({ pct, size, stroke, color, track }) {
  const radius = (size - stroke) / 2;
  const circ = 2 * Math.PI * radius;
  const offset = circ - (pct / 100) * circ;
  return (
    <svg width={size} height={size} style={{transform:"rotate(-90deg)", display:"block"}}>
      <circle cx={size/2} cy={size/2} r={radius} fill="none" stroke={track || C.accentSoft} strokeWidth={stroke}/>
      <circle cx={size/2} cy={size/2} r={radius} fill="none" stroke={color} strokeWidth={stroke} strokeLinecap="round"
        strokeDasharray={circ} strokeDashoffset={offset} style={{transition:"stroke-dashoffset .5s ease"}}/>
    </svg>
  );
}

// ═══ WEEK GRID (7-day row) ═══════════════════════════════════════════════════
function WeekGrid({ week, state, onSelect, highlightToday = false, today }) {
  const wd = PROG[week];
  const items = [
    { l:"Пн", type:"t", i:0 },
    { l:"Вт", type:"r", i:0 },
    { l:"Ср", type:"t", i:1 },
    { l:"Чт", type:"r", i:1 },
    { l:"Пт", type:"t", i:2 },
    { l:"Сб", type:"r", i:2 },
    { l:"Вс", type:"r", i:3 },
  ];
  const trainDow = [1, 3, 5];
  const restDow = [2, 4, 6, 0];

  return (
    <div style={{display:"grid", gridTemplateColumns:"repeat(7, 1fr)", gap:6, width:"100%"}}>
      {items.map((d, i) => {
        const isToday = highlightToday && (
          (d.type === "t" && today === trainDow[d.i]) ||
          (d.type === "r" && today === restDow[d.i])
        );

        if (d.type === "t") {
          const day = wd.days[d.i];
          if (!day) return <div key={i}/>;
          const done = day.ex.filter(e => state.completed[e.id]).length;
          const total = day.ex.length;
          const complete = done === total;
          return (
            <button key={i} onClick={() => onSelect("day", d.i)}
              style={{
                aspectRatio:"1/1.2",
                display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
                background: complete ? C.accent : (isToday ? C.accentSoft : C.card),
                border: `1.5px solid ${complete ? C.accent : (isToday ? C.accent : C.border)}`,
                borderRadius: 10,
                color: complete ? "#fff" : C.text,
                padding: 2,
                gap: 2,
                transition:"all .15s"
              }}>
              <div style={{fontSize:10, fontWeight:600, opacity:0.7, lineHeight:1}}>{d.l}</div>
              <div style={{fontSize:11, fontWeight:700, lineHeight:1, fontVariantNumeric:"tabular-nums"}}>{done}/{total}</div>
            </button>
          );
        } else {
          const rk = `r-${week}-${d.i}`;
          const rd = state.rest[rk] || {};
          const rdone = REST_EX.filter(e => rd[e.id]).length;
          const rcomplete = rdone === REST_EX.length;
          return (
            <button key={i} onClick={() => onSelect("rest", d.i)}
              style={{
                aspectRatio:"1/1.2",
                display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
                background: rcomplete ? C.green : (isToday ? C.greenSoft : C.cardDim),
                border: `1.5px solid ${rcomplete ? C.green : (isToday ? C.green : C.border)}`,
                borderRadius: 10,
                color: rcomplete ? "#fff" : C.textDim,
                padding: 2,
                gap: 2,
                transition:"all .15s"
              }}>
              <div style={{fontSize:10, fontWeight:600, opacity:0.8, lineHeight:1}}>{d.l}</div>
              <div style={{fontSize:10, fontWeight:600, lineHeight:1, fontVariantNumeric:"tabular-nums"}}>
                {rdone > 0 ? `${rdone}/6` : "—"}
              </div>
            </button>
          );
        }
      })}
    </div>
  );
}

            return (
              <div key={ex.id} style={{...S.exCard, opacity: d ? 0.5 : 1, alignItems:"center"}}>
                <button onClick={() => toggleRest(rk, ex.id)}
                  style={{...S.checkbox, background: d ? C.green : "#fff", borderColor: d ? C.green : C.border}}>
                  {d && <Icon name="check" size={14} color="#fff" stroke={3}/>}
                </button>
                <div style={{flex:1}}>
                  <div style={{fontSize:15, fontWeight:600, color:C.text, marginBottom:3, lineHeight:1.3}}>{ex.n}</div>
                  <div style={{fontSize:13, color:C.textDim}}>{ex.s}</div>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  // ── CALENDAR VIEW (full 16 weeks) ──
  if (view === "calendar") {
    return (
      <div style={sc}>
        <PageHeader
          onBack={() => setView("home")}
          center={<div style={{fontSize:16, fontWeight:700}}>Программа</div>}
        />
        <div style={{padding:`${SP.sm}px ${SP.lg}px 40px`}}>
          {Array.from({length:16}, (_,i) => i+1).map(wn => {
            const wd = PROG[wn];
            const ph = getPhase(wn);
            const isCur = wn === curWeek;
            const wEx = wd.days.flatMap(d => d.ex);
            const done = wEx.filter(e => state.completed[e.id]).length;
            const total = wEx.length;
            const wPct = total ? (done/total*100) : 0;
            const isFirstOfPhase = PHASES.some(p => p.weeks[0] === wn);
            const curPh = PHASES.find(p => p.weeks[0] === wn);

            return (
              <React.Fragment key={wn}>
                {isFirstOfPhase && (
                  <div style={{display:"flex", alignItems:"center", gap:10, padding:`${SP.xl}px ${SP.xs}px ${SP.sm}px`, fontSize:11, fontWeight:700, letterSpacing:1.5, textTransform:"uppercase", color:C.textDim}}>
                    <span style={{width:8, height:8, borderRadius:4, background:curPh.dot, flexShrink:0}}/>
                    {curPh.name}
                  </div>
                )}
                <div style={{
                  background: C.card,
                  border: `${isCur ? 2 : 1}px solid ${isCur ? C.accent : C.border}`,
                  borderRadius: 14,
                  padding: SP.lg,
                  marginBottom: SP.sm
                }}>
                  <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:SP.md}}>
                    <div>
                      <div style={{fontSize:10, color:C.textDim, textTransform:"uppercase", letterSpacing:1, fontWeight:600}}>Неделя</div>
                      <div style={{display:"flex", alignItems:"center", gap:8, marginTop:2}}>
                        <div style={{fontSize:22, fontWeight:800, lineHeight:1, fontVariantNumeric:"tabular-nums"}}>{wn}</div>
                        {isCur && (
                          <span style={{fontSize:10, color:C.orange, fontWeight:700, letterSpacing:1.2, background:"#FFF1E8", padding:"3px 7px", borderRadius:4}}>
                            СЕЙЧАС
                          </span>
                        )}
                      </div>
                    </div>
                    <div style={{position:"relative", width:40, height:40, flexShrink:0}}>
                      <CircleProgress pct={wPct} size={40} stroke={3} color={done===total && total>0 ? C.green : C.accent}/>
                      <div style={{position:"absolute", inset:0, display:"flex", alignItems:"center", justifyContent:"center", fontSize:10, fontWeight:700, fontVariantNumeric:"tabular-nums"}}>
                        {done}/{total}
                      </div>
                    </div>
                  </div>
                  <WeekGrid
                    week={wn}
                    state={state}
                    onSelect={(type, i) => { setSelW(wn); setSelD(i); setView(type); }}
                    highlightToday={isCur}
                    today={dayOfWeek}
                  />
                </div>
              </React.Fragment>
            );
          })}
        </div>
      </div>
    );
  }

  // ── HOME VIEW ──
  const phase = getPhase(curWeek);
  const todayDay = isTrainingToday ? PROG[curWeek].days[todayDayIdx] : null;
  const todayDone = todayDay ? todayDay.ex.filter(e => state.completed[e.id]).length : 0;
  const todayTotal = todayDay ? todayDay.ex.length : 0;
  const todayPct = todayTotal ? (todayDone/todayTotal*100) : 0;

  const todayRestKey = isRestToday ? `r-${curWeek}-${todayRestIdx}` : null;
  const todayRestData = todayRestKey ? (state.rest[todayRestKey] || {}) : {};
  const todayRestDone = REST_EX.filter(e => todayRestData[e.id]).length;

  const weekEx = PROG[curWeek].days.flatMap(d => d.ex);
  const weekDone = weekEx.filter(e => state.completed[e.id]).length;
  const weekTotal = weekEx.length;

  return (
    <div style={sc}>
      {/* HEADER */}
      <div style={{padding:`${SP.lg}px ${SP.lg}px ${SP.md}px`, display:"flex", alignItems:"flex-start", justifyContent:"space-between", gap:SP.md}}>
        <div style={{flex:1, minWidth:0}}>
          <h1 style={{fontSize:28, fontWeight:800, letterSpacing:-0.5, margin:0, lineHeight:1.15}}>Тренировки</h1>
          <div style={{fontSize:13, color:C.textDim, marginTop:6, fontWeight:500, display:"flex", alignItems:"center", gap:6}}>
            <span style={{width:8, height:8, borderRadius:4, background:phase.dot, flexShrink:0}}/>
            <span>Неделя {curWeek} · {phase.name}</span>
          </div>
        </div>
        <button onClick={() => setView("calendar")} style={S.iconButton}>
          <Icon name="calendar" size={18}/>
        </button>
      </div>

      {/* STATS ROW */}
      <div style={{padding:`0 ${SP.lg}px`, display:"flex", gap:SP.sm, marginBottom:SP.md}}>
        <div style={{...S.statCard, flex:1}}>
          <div style={{width:48, height:48, position:"relative"}}>
            <CircleProgress pct={totalPct} size={48} stroke={4} color={C.accent}/>
            <div style={{position:"absolute", inset:0, display:"flex", alignItems:"center", justifyContent:"center", fontSize:13, fontWeight:700, fontVariantNumeric:"tabular-nums"}}>
              {Math.round(totalPct)}
            </div>
          </div>
          <div>
            <div style={{fontSize:11, color:C.textDim, fontWeight:500, textTransform:"uppercase", letterSpacing:0.5}}>Прогресс</div>
            <div style={{fontSize:16, fontWeight:700, marginTop:3, fontVariantNumeric:"tabular-nums"}}>
              {totalDone}<span style={{fontSize:12, color:C.textDim, fontWeight:500, marginLeft:4}}>/ {allEx.length}</span>
            </div>
          </div>
        </div>
        <div style={{...S.statCard, flex:1}}>
          <div style={{fontSize:30, fontWeight:800, letterSpacing:-0.5, lineHeight:1, fontVariantNumeric:"tabular-nums"}}>
            {curWeek}<span style={{fontSize:13, color:C.textDim, fontWeight:500, marginLeft:4}}>/ 16</span>
          </div>
          <div>
            <div style={{fontSize:11, color:C.textDim, fontWeight:500, textTransform:"uppercase", letterSpacing:0.5}}>Неделя</div>
            <div style={{fontSize:13, fontWeight:600, marginTop:3, color:phase.dot, lineHeight:1.2}}>{phase.name}</div>
          </div>
        </div>
      </div>

      {/* TODAY CARD */}
      {(isTrainingToday && todayDay) && (
        <div style={{padding:`0 ${SP.lg}px`, marginBottom:SP.md}}>
          <button onClick={() => { setSelW(curWeek); setSelD(todayDayIdx); setView("day"); }}
            style={{...S.todayCardDark, textAlign:"left"}}>
            <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", gap:SP.md}}>
              <div style={{flex:1, minWidth:0}}>
                <div style={{fontSize:10, color:"rgba(255,255,255,0.6)", textTransform:"uppercase", letterSpacing:1.2, fontWeight:700}}>Сегодня</div>
                <div style={{fontSize:22, fontWeight:700, marginTop:6, color:"#fff", lineHeight:1.15}}>{todayDay.name}</div>
                <div style={{fontSize:13, color:"rgba(255,255,255,0.75)", fontWeight:500, marginTop:SP.md}}>
                  {todayPct === 100 ? "Выполнено · Отличная работа" : todayPct > 0 ? "Продолжить тренировку" : "Начать тренировку →"}
                </div>
              </div>
              <div style={{position:"relative", width:54, height:54, flexShrink:0}}>
                <CircleProgress pct={todayPct} size={54} stroke={4} color="#fff" track="rgba(255,255,255,0.2)"/>
                <div style={{position:"absolute", inset:0, display:"flex", alignItems:"center", justifyContent:"center", fontSize:12, fontWeight:700, color:"#fff", fontVariantNumeric:"tabular-nums"}}>
                  {todayDone}/{todayTotal}
                </div>
              </div>
            </div>
          </button>
        </div>
      )}

      {(!isTrainingToday && isRestToday) && (
        <div style={{padding:`0 ${SP.lg}px`, marginBottom:SP.md}}>
          <button onClick={() => { setSelW(curWeek); setSelD(todayRestIdx); setView("rest"); }}
            style={{...S.todayCardLight, textAlign:"left"}}>
            <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", gap:SP.md}}>
              <div style={{flex:1, minWidth:0}}>
                <div style={{fontSize:10, color:C.textDim, textTransform:"uppercase", letterSpacing:1.2, fontWeight:700}}>Сегодня</div>
                <div style={{fontSize:22, fontWeight:700, marginTop:6, color:C.text, lineHeight:1.15}}>День отдыха</div>
                <div style={{fontSize:13, color:C.textDim, marginTop:SP.md, fontWeight:500}}>
                  {todayRestDone > 0 ? `Домашняя работа: ${todayRestDone}/${REST_EX.length}` : "Домашняя работа · 15-20 мин"}
                </div>
              </div>
              <div style={{width:48, height:48, borderRadius:24, background:C.accentSoft, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0}}>
                <Icon name="moon" size={20} color={C.text}/>
              </div>
            </div>
          </button>
        </div>
      )}

      {/* WEEK OVERVIEW */}
      <div style={{padding:`0 ${SP.lg}px`, marginBottom:SP.md}}>
        <div style={{...S.card, padding:SP.lg}}>
          <div style={{display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:SP.md, gap:SP.sm}}>
            <div style={{flex:1, minWidth:0}}>
              <div style={{fontSize:16, fontWeight:700, color:C.text, lineHeight:1.2}}>Эта неделя</div>
              <div style={{fontSize:12, color:C.textDim, marginTop:3, fontVariantNumeric:"tabular-nums"}}>
                {weekDone} из {weekTotal} упражнений
              </div>
            </div>
            <button onClick={() => setView("calendar")}
              style={{display:"flex", alignItems:"center", gap:3, color:C.textDim, fontSize:13, fontWeight:500, padding:"4px 0"}}>
              Все
              <Icon name="chevron" size={14} color={C.textDim}/>
            </button>
          </div>
          <WeekGrid
            week={curWeek}
            state={state}
            onSelect={(type, i) => { setSelW(curWeek); setSelD(i); setView(type); }}
            highlightToday={true}
            today={dayOfWeek}
          />
        </div>
      </div>

      {/* PHASE INFO */}
      <div style={{padding:`0 ${SP.lg}px`, marginBottom:SP.xl}}>
        <div style={{...S.card, padding:SP.lg}}>
          <div style={{display:"flex", alignItems:"center", gap:8, marginBottom:SP.sm}}>
            <span style={{width:8, height:8, borderRadius:4, background:phase.dot, flexShrink:0}}/>
            <div style={{fontSize:10, color:C.textDim, textTransform:"uppercase", letterSpacing:1.2, fontWeight:700}}>Текущая фаза</div>
          </div>
          <div style={{fontSize:17, fontWeight:700, marginBottom:6, lineHeight:1.2}}>{phase.name}</div>
          <div style={{fontSize:13, color:C.textDim, lineHeight:1.5}}>{phase.desc}</div>
        </div>
      </div>

      {/* RESET */}
      <button
        onClick={() => { if(confirm("Сбросить весь прогресс?")) save({startDate:null, completed:{}, weights:{}, rest:{}}); }}
        style={{display:"block", margin:`${SP.sm}px auto 0`, background:"transparent", color:C.textSoft, padding:"10px 16px", fontSize:12, fontWeight:500}}>
        Сбросить прогресс
      </button>
      <div style={{height:40}}/>
    </div>
  );
}

// ═══ PAGE HEADER COMPONENT ═══════════════════════════════════════════════════
function PageHeader({ onBack, center }) {
  return (
    <div style={{display:"grid", gridTemplateColumns:"36px 1fr 36px", alignItems:"center", padding:`${SP.md}px ${SP.lg}px`, gap:SP.md, background:C.bg, position:"sticky", top:0, zIndex:10}}>
      <button onClick={onBack} style={S.iconButton}>
        <Icon name="back" size={18}/>
      </button>
      <div style={{textAlign:"center", minWidth:0}}>{center}</div>
      <div/>
    </div>
  );
}

// ═══ START SCREEN ═════════════════════════════════════════════════════════════
function Start({ onStart }) {
  const today = new Date().toISOString().split("T")[0];
  const [date, setDate] = useState(today);

  return (
    <div style={{
      minHeight:"100vh",
      background:C.bg,
      display:"flex",
      flexDirection:"column",
      alignItems:"center",
      justifyContent:"center",
      padding:`${SP.xxxl}px ${SP.xxl}px`,
      boxSizing:"border-box"
    }}>
      {/* Logo */}
      <div style={{textAlign:"center", marginBottom:SP.xxxl}}>
        <div style={{
          width:72, height:72, margin:"0 auto",
          borderRadius:20,
          background:C.accent,
          display:"flex", alignItems:"center", justifyContent:"center"
        }}>
          <Icon name="logo" size={34} color="#fff" stroke={2}/>
        </div>
        <h1 style={{fontSize:32, fontWeight:800, letterSpacing:-0.5, margin:`${SP.lg}px 0 ${SP.xs}px`, color:C.text, lineHeight:1.1}}>
          IRON
        </h1>
        <p style={{fontSize:14, color:C.textDim, margin:0, fontWeight:500}}>
          16 недель · сила + гипертрофия
        </p>
      </div>

      {/* Card */}
      <div style={{
        width:"100%", maxWidth:320,
        background:C.card,
        border:`1px solid ${C.border}`,
        borderRadius:16,
        padding:SP.xl
      }}>
        <label style={{
          display:"block",
          fontSize:11, color:C.textDim, fontWeight:600,
          textTransform:"uppercase", letterSpacing:1,
          marginBottom:SP.sm
        }}>
          Дата старта
        </label>
        <input
          type="date"
          value={date}
          onChange={e => setDate(e.target.value)}
          style={{
            width:"100%",
            background:C.bg,
            border:`1px solid ${C.border}`,
            color:C.text,
            padding:`14px ${SP.md}px`,
            borderRadius:10,
            fontSize:15,
            fontWeight:600,
            textAlign:"center",
            marginBottom:SP.md,
            fontVariantNumeric:"tabular-nums"
          }}
        />
        <button
          onClick={() => onStart(date)}
          style={{
            width:"100%",
            background:C.accent,
            color:"#fff",
            padding:"15px",
            borderRadius:10,
            fontSize:15,
            fontWeight:700,
            letterSpacing:0.3,
            display:"flex", alignItems:"center", justifyContent:"center", gap:6
          }}>
          Начать
          <Icon name="chevron" size={16} color="#fff" stroke={2.5}/>
        </button>
      </div>

      {/* Footer */}
      <div style={{marginTop:SP.xxxl, textAlign:"center", fontSize:12, color:C.textSoft, lineHeight:2}}>
        <div>3 тренировки в неделю</div>
        <div>Прогресс сохраняется на устройстве</div>
      </div>
    </div>
  );
}

  },

    fontVariantNumeric:"tabular-nums"
  },
};

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
