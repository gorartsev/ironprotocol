const PROG = buildProgram();
const TIER_BG = { T1: "#1A1A1A", T2: "#6A6A66", T3: "#B8B8B4" };

function CircleProgress({ pct, size, stroke, color, track }) {
  const radius = (size - stroke) / 2;
  const circ = 2 * Math.PI * radius;
  const offset = circ - (pct / 100) * circ;
  return (
    <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
      <circle cx={size/2} cy={size/2} r={radius} fill="none" stroke={track || "#E8E8E4"} strokeWidth={stroke}/>
      <circle cx={size/2} cy={size/2} r={radius} fill="none" stroke={color} strokeWidth={stroke} strokeLinecap="round"
        strokeDasharray={circ} strokeDashoffset={offset} style={{transition:"stroke-dashoffset .5s"}}/>
    </svg>
  );
}

                      {l:"Ср", type:"t", i:1},
                      {l:"Чт", type:"r", i:1},
                      {l:"Пт", type:"t", i:2},
                      {l:"Сб", type:"r", i:2},
                      {l:"Вс", type:"r", i:3},
                    ].map((d, i) => {
                      if (d.type === "t") {
                        const day = wd.days[d.i];
                        if (!day) return <div key={i} style={S.dayPill}/>;
                        const dd = day.ex.filter(e => state.completed[e.id]).length;
                        const dc = dd === day.ex.length;
                        return (
                          <button key={i} onClick={() => {setSelW(wn); setSelD(d.i); setView("day");}}
                            style={{...S.dayPill, background: dc ? "#1A1A1A" : "#FFFFFF", borderColor: dc ? "#1A1A1A" : "#E5E5E1", color: dc ? "#fff" : "#1A1A1A"}}>
                            <div style={{fontSize:10, fontWeight:500, opacity:0.7}}>{d.l}</div>
                            <div style={{fontSize:11, fontWeight:700, marginTop:2}}>{dd}/{day.ex.length}</div>
                          </button>
                        );
                      } else {
                        const rk = `r-${wn}-${d.i}`;
                        const rd = state.rest[rk] || {};
                        const rdd = REST_EX.filter(e => rd[e.id]).length;
                        const rdc = rdd === REST_EX.length;
                        return (
                          <button key={i} onClick={() => {setSelW(wn); setSelD(d.i); setView("rest");}}
                            style={{...S.dayPill, background: rdc ? "#4A9B5F" : "#EFEFED", borderColor: rdc ? "#4A9B5F" : "#E5E5E1", color: rdc ? "#fff" : "#8A8A86"}}>
                            <div style={{fontSize:10, fontWeight:500, opacity:0.8}}>{d.l}</div>
                            <div style={{fontSize:10, fontWeight:600, marginTop:2}}>{rdd > 0 ? `${rdd}/6` : "—"}</div>
                          </button>
                        );
                      }
                    })}
                  </div>
                </div>
              </React.Fragment>
            );
          })}
        </div>
      </div>
    );
  }

  // HOME
  const phase = getPhase(curWeek);
  const todayDay = isTrainingToday ? PROG[curWeek].days[todayDayIdx] : null;
  const todayDone = todayDay ? todayDay.ex.filter(e => state.completed[e.id]).length : 0;
  const todayTotal = todayDay ? todayDay.ex.length : 0;
  const todayPct = todayTotal > 0 ? (todayDone/todayTotal*100) : 0;

  const restDayMap = { 2: 0, 4: 1, 6: 2, 0: 3 };
  const isRestToday = dayOfWeek in restDayMap;
  const todayRestIdx = restDayMap[dayOfWeek];
  const todayRestKey = isRestToday ? `r-${curWeek}-${todayRestIdx}` : null;
  const todayRestData = todayRestKey ? (state.rest[todayRestKey] || {}) : {};
  const todayRestDone = Object.values(todayRestData).filter(Boolean).length;

  const weekEx = PROG[curWeek].days.flatMap(d => d.ex);
  const weekDone = weekEx.filter(e => state.completed[e.id]).length;
  const weekTotal = weekEx.length;

  return (
    <div style={S.screen}>
      <div style={S.homeHeader}>
        <div>
          <h1 style={{fontSize:28, fontWeight:800, letterSpacing:-0.5, margin:0}}>Тренировки</h1>
          <div style={{fontSize:13, color:"#8A8A86", marginTop:4, fontWeight:500}}>
            <span style={{...S.phaseDot, background: phase.dot, display:"inline-block", marginRight:6, verticalAlign:"middle"}}/>
            Неделя {curWeek} · {phase.name}
          </div>
        </div>
        <button onClick={() => setView("calendar")} style={S.headBtn}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        </button>
      </div>

      <div style={{padding:"0 16px", display:"flex", gap:10, marginBottom:14}}>
        <div style={{...S.statCard, flex:1}}>
          <div style={{position:"relative", width:52, height:52}}>
            <CircleProgress pct={totalPct} size={52} stroke={4} color="#1A1A1A"/>
            <div style={{position:"absolute", inset:0, display:"flex", alignItems:"center", justifyContent:"center", fontSize:14, fontWeight:700}}>{Math.round(totalPct)}</div>
          </div>
          <div style={{marginTop:10}}>
            <div style={{fontSize:12, color:"#8A8A86", fontWeight:500}}>Прогресс</div>
            <div style={{fontSize:17, fontWeight:700, marginTop:2}}>{totalDone} <span style={{fontSize:12, color:"#8A8A86", fontWeight:500}}>из {allEx.length}</span></div>
          </div>
        </div>
        <div style={{...S.statCard, flex:1}}>
          <div style={{fontSize:32, fontWeight:800, letterSpacing:-1}}>{curWeek}<span style={{fontSize:13, color:"#8A8A86", fontWeight:500, marginLeft:4}}>/ 16</span></div>
          <div style={{marginTop:8}}>
            <div style={{fontSize:12, color:"#8A8A86", fontWeight:500}}>Неделя</div>
            <div style={{fontSize:13, fontWeight:600, marginTop:2, color: phase.dot}}>{phase.name}</div>
          </div>
        </div>
      </div>

      <div style={{padding:"0 16px", marginBottom:14}}>
        {isTrainingToday && todayDay ? (
          <button onClick={() => {setSelW(curWeek); setSelD(todayDayIdx); setView("day");}} style={{...S.todayCard, textAlign:"left"}}>
            <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:14}}>
              <div>
                <div style={{fontSize:11, color:"rgba(255,255,255,0.6)", textTransform:"uppercase", letterSpacing:1.5, fontWeight:600}}>Сегодня</div>
                <div style={{fontSize:22, fontWeight:700, marginTop:4, color:"#fff"}}>{todayDay.name}</div>
              </div>
              <div style={{position:"relative", width:56, height:56}}>
                <CircleProgress pct={todayPct} size={56} stroke={4} color="#fff" track="rgba(255,255,255,0.15)"/>
                <div style={{position:"absolute", inset:0, display:"flex", alignItems:"center", justifyContent:"center", fontSize:13, fontWeight:700, color:"#fff"}}>{todayDone}/{todayTotal}</div>
              </div>
            </div>
            <div style={{fontSize:13, color:"rgba(255,255,255,0.8)", fontWeight:500}}>
              {todayPct === 100 ? "Выполнено · Отличная работа" : todayPct > 0 ? "Продолжить тренировку" : "Начать тренировку →"}
            </div>
          </button>
        ) : isRestToday ? (
          <button onClick={() => {setSelW(curWeek); setSelD(todayRestIdx); setView("rest");}} style={{...S.todayCardLight, textAlign:"left"}}>
            <div style={{display:"flex", alignItems:"center", justifyContent:"space-between"}}>
              <div>
                <div style={{fontSize:11, color:"#8A8A86", textTransform:"uppercase", letterSpacing:1.5, fontWeight:600}}>Сегодня</div>
                <div style={{fontSize:22, fontWeight:700, marginTop:4, color:"#1A1A1A"}}>День отдыха</div>
                <div style={{fontSize:13, color:"#8A8A86", marginTop:8, fontWeight:500}}>
                  {todayRestDone > 0 ? `Домашняя работа: ${todayRestDone}/6` : "Домашняя работа · 15-20 мин"}
                </div>
              </div>
              <div style={{width:48, height:48, borderRadius:24, background:"#E8E8E4", display:"flex", alignItems:"center", justifyContent:"center"}}>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1A1A1A" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
              </div>
            </div>
          </button>
        ) : null}
      </div>

      <div style={{padding:"0 16px", marginBottom:14}}>
        <div style={{...S.card, padding:18}}>
          <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14}}>
            <div>
              <div style={{fontSize:16, fontWeight:700}}>Эта неделя</div>
              <div style={{fontSize:12, color:"#8A8A86", marginTop:2}}>{weekDone} из {weekTotal} упражнений</div>
            </div>
            <button onClick={() => setView("calendar")} style={{background:"transparent", color:"#8A8A86", fontSize:13, fontWeight:500, padding:0}}>
              Все →
            </button>
          </div>
          <div style={S.daysGrid}>
            {[
              {l:"Пн", type:"t", i:0},
              {l:"Вт", type:"r", i:0},
              {l:"Ср", type:"t", i:1},
              {l:"Чт", type:"r", i:1},
              {l:"Пт", type:"t", i:2},
              {l:"Сб", type:"r", i:2},
              {l:"Вс", type:"r", i:3},
            ].map((d, i) => {
              const isToday = (d.type === "t" && dayOfWeek === [1,3,5][d.i]) || (d.type === "r" && dayOfWeek === [2,4,6,0][d.i]);
              if (d.type === "t") {
                const day = PROG[curWeek].days[d.i];
                if (!day) return <div key={i} style={S.dayPill}/>;
                const dd = day.ex.filter(e => state.completed[e.id]).length;
                const dc = dd === day.ex.length;
                return (
                  <button key={i} onClick={() => {setSelW(curWeek); setSelD(d.i); setView("day");}}
                    style={{...S.dayPill,
                      background: dc ? "#1A1A1A" : (isToday ? "#E8E8E4" : "#FFFFFF"),
                      borderColor: dc ? "#1A1A1A" : (isToday ? "#1A1A1A" : "#E5E5E1"),
                      color: dc ? "#fff" : "#1A1A1A"
                    }}>
                    <div style={{fontSize:10, fontWeight:500, opacity:0.7}}>{d.l}</div>
                    <div style={{fontSize:11, fontWeight:700, marginTop:2}}>{dd}/{day.ex.length}</div>
                  </button>
                );
              } else {
                const rk = `r-${curWeek}-${d.i}`;
                const rd = state.rest[rk] || {};
                const rdd = REST_EX.filter(e => rd[e.id]).length;
                const rdc = rdd === REST_EX.length;
                return (
                  <button key={i} onClick={() => {setSelW(curWeek); setSelD(d.i); setView("rest");}}
                    style={{...S.dayPill,
                      background: rdc ? "#4A9B5F" : (isToday ? "#EDF5EE" : "#EFEFED"),
                      borderColor: rdc ? "#4A9B5F" : (isToday ? "#4A9B5F" : "#E5E5E1"),
                      color: rdc ? "#fff" : "#8A8A86"
                    }}>
                    <div style={{fontSize:10, fontWeight:500, opacity:0.8}}>{d.l}</div>
                    <div style={{fontSize:10, fontWeight:600, marginTop:2}}>{rdd > 0 ? `${rdd}/6` : "—"}</div>
                  </button>
                );
              }
            })}
          </div>
        </div>
      </div>

      <div style={{padding:"0 16px", marginBottom:24}}>
        <div style={{...S.card, padding:18}}>
          <div style={{display:"flex", alignItems:"center", gap:10, marginBottom:10}}>
            <span style={{...S.phaseDot, background: phase.dot, width:10, height:10}}/>
            <div style={{fontSize:11, color:"#8A8A86", textTransform:"uppercase", letterSpacing:1.5, fontWeight:600}}>Текущая фаза</div>
          </div>
          <div style={{fontSize:18, fontWeight:700, marginBottom:6}}>{phase.name}</div>
          <div style={{fontSize:13, color:"#8A8A86", lineHeight:1.5}}>
            {phase.name === "Реадаптация" && "Восстановление моторных паттернов, адаптация сухожилий. Zercher возвращается на 5-й неделе."}
            {phase.name === "Гипертрофия" && "Максимальный набор мышечной массы. DUP-периодизация. Zercher как T1."}
            {phase.name === "Разгрузка" && "Сброс накопленного утомления перед силовой фазой."}
            {phase.name === "Сила 5/3/1" && "Конвертация мышечной массы в максимальную силу."}
            {phase.name === "Переход" && "Мини-разгрузка перед пиком."}
            {phase.name === "Пик" && "Тейпер, тест новых 1ПМ."}
          </div>
        </div>
      </div>

      <button onClick={() => {if(confirm("Сбросить весь прогресс?")) save({startDate:null, completed:{}, weights:{}, rest:{}})}} style={S.resetBtn}>
        Сбросить прогресс
      </button>
      <div style={{height:40}}/>
    </div>
  );
}

function Start({ onStart }) {
  const today = new Date().toISOString().split("T")[0];
  const [date, setDate] = useState(today);
  return (
    <div style={S.startScreen}>
      <div style={{textAlign:"center", marginBottom:40}}>
        <div style={{width:64, height:64, margin:"0 auto 20px", borderRadius:18, background:"#1A1A1A", display:"flex", alignItems:"center", justifyContent:"center"}}>
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6.5 6.5h11v11h-11z"/><path d="M6.5 6.5L3 3m14.5 3.5L21 3m-14.5 14.5L3 21m14.5-3.5L21 21"/></svg>
        </div>
        <h1 style={{fontSize:30, fontWeight:800, letterSpacing:-0.5, margin:0}}>IRON</h1>
        <p style={{fontSize:14, color:"#8A8A86", marginTop:6, fontWeight:500}}>16 недель · сила + гипертрофия</p>
      </div>
      <div style={{...S.card, padding:20, width:"100%", maxWidth:320}}>
        <div style={{fontSize:13, color:"#8A8A86", fontWeight:500, marginBottom:10}}>Дата старта</div>
        <input type="date" value={date} onChange={e => setDate(e.target.value)}
          style={{width:"100%", background:"#EFEFED", border:"1px solid #E5E5E1", color:"#1A1A1A",
            padding:"12px 14px", borderRadius:10, fontSize:15, textAlign:"center",
            marginBottom:14, boxSizing:"border-box", fontWeight:500}}/>
        <button onClick={() => onStart(date)} style={{width:"100%", background:"#1A1A1A", color:"#fff",
          padding:"14px", borderRadius:10, fontSize:15, fontWeight:700, letterSpacing:0.3}}>
          Начать →
        </button>
      </div>
      <div style={{marginTop:32, textAlign:"center", fontSize:12, color:"#B8B8B4", lineHeight:1.8}}>
        <div>3 тренировки в неделю</div>
        <div>Прогресс сохраняется на устройстве</div>
      </div>
    </div>
  );
}

const S = {
  screen: { maxWidth:480, margin:"0 auto", background:"#F5F5F3", minHeight:"100vh", color:"#1A1A1A" },
  startScreen: { display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
    minHeight:"100vh", background:"#F5F5F3", padding:24 },

  pageHeader: { display:"flex", alignItems:"center", justifyContent:"space-between", padding:"14px 16px",
    background:"#F5F5F3", position:"sticky", top:0, zIndex:10 },
  iconBtn: { width:36, height:36, borderRadius:10, background:"#FFFFFF", border:"1px solid #E5E5E1",
    display:"flex", alignItems:"center", justifyContent:"center", color:"#1A1A1A" },

  homeHeader: { display:"flex", alignItems:"flex-start", justifyContent:"space-between", padding:"16px 16px 20px" },
  headBtn: { width:42, height:42, borderRadius:12, background:"#FFFFFF", border:"1px solid #E5E5E1",
    display:"flex", alignItems:"center", justifyContent:"center", color:"#1A1A1A" },

  h1: { fontSize:26, fontWeight:800, letterSpacing:-0.5, margin:0, color:"#1A1A1A" },

  card: { background:"#FFFFFF", border:"1px solid #E5E5E1", borderRadius:16 },

  statCard: { background:"#FFFFFF", border:"1px solid #E5E5E1", borderRadius:16, padding:16, minHeight:120 },

  todayCard: { width:"100%", background:"#1A1A1A", border:"none", borderRadius:18, padding:20, color:"#fff" },
  todayCardLight: { width:"100%", background:"#FFFFFF", border:"1px solid #E5E5E1", borderRadius:18, padding:20 },

  badge: { display:"inline-flex", alignItems:"center", gap:6, padding:"5px 10px", borderRadius:6, fontSize:11, fontWeight:700, letterSpacing:0.5, textTransform:"uppercase" },

  progressRow: { display:"flex", alignItems:"center", gap:12 },
  progressBar: { flex:1, height:6, background:"#E8E8E4", borderRadius:3, overflow:"hidden" },
  progressFill: { height:"100%", background:"#1A1A1A", borderRadius:3, transition:"width .4s" },

  exCard: { display:"flex", alignItems:"flex-start", gap:12, background:"#FFFFFF",
    border:"1px solid #E5E5E1", borderRadius:14, padding:14, marginBottom:8 },
  chk: { width:28, height:28, minWidth:28, borderRadius:8, border:"2px solid", display:"flex",
    alignItems:"center", justifyContent:"center", flexShrink:0, marginTop:2, transition:"all .2s" },
  tierBadge: { fontSize:9, fontWeight:800, letterSpacing:0.5, color:"#fff", padding:"2px 6px", borderRadius:4 },

  weightInputWrap: { display:"flex", alignItems:"center", gap:6, marginTop:10, paddingTop:10,
    borderTop:"1px solid #E5E5E1" },
  weightIn: { width:70, background:"#EFEFED", border:"1px solid #E5E5E1", borderRadius:8,
    color:"#1A1A1A", padding:"6px 10px", fontSize:14, fontWeight:600, textAlign:"center" },

  phaseLabel: { display:"flex", alignItems:"center", gap:8, padding:"16px 6px 10px", fontSize:11,
    fontWeight:700, letterSpacing:1.5, textTransform:"uppercase", color:"#8A8A86" },
  phaseDot: { width:8, height:8, borderRadius:4, display:"inline-block", flexShrink:0 },

  weekCard: { background:"#FFFFFF", border:"1px solid #E5E5E1", borderRadius:14, padding:16, marginBottom:10 },

  daysGrid: { display:"grid", gridTemplateColumns:"repeat(7, 1fr)", gap:5 },
  dayPill: { aspectRatio:"1/1.15", border:"1px solid #E5E5E1", borderRadius:10, background:"#FFFFFF",
    display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:2,
    color:"#1A1A1A", transition:"all .15s" },

  resetBtn: { display:"block", margin:"8px auto 0", background:"transparent", border:"none",
    color:"#B8B8B4", padding:"10px 16px", fontSize:12, fontWeight:500 },
};

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
