  );
}

function GoalsSetup({ onSave }) {

    { id: uid(), text: "", identity: "" },
  ]);
  const update = (id, k, v) => setItems(items.map(it => it.id === id ? {...it, [k]: v} : it));
  const add = () => items.length < 3 && setItems([...items, { id: uid(), text: "", identity: "" }]);

  const valid = items.some(it => it.text.trim() && it.identity.trim());

  return (
    <div style={{...sc, padding: `${SP.xxl}px ${SP.xl}px`}}>
      <div style={{maxWidth: 480, margin: "0 auto"}}>

            </div>

              value={it.identity}
              onChange={e => update(it.id, "identity", e.target.value)}

              rows={2}
              style={{
                width: "100%", padding: SP.sm,
                border: `1px solid ${C.border}`, borderRadius: 6,
                fontSize: 14, background: C.bg, outline: "none",

          </div>
        ))}

          <button onClick={add} style={{
            width: "100%", padding: SP.md,

// ═══ MAIN APP ════════════════════════════════════════════════════════════════
function App() {
  const [state, setState] = useState(() => storage.get() || defaultState());
  const [view, setView] = useState({ name: "home" });

  const save = (s) => { setState(s); storage.set(s); };

  // ─── Onboarding ───
  if (!state.acceptedAt) {
    return <Disclaimer onAccept={() => save({...state, acceptedAt: new Date().toISOString()})}/>;
  }
  if (state.goals.length === 0) {
    return <GoalsSetup onSave={(goals) => save({...state, goals, startDate: new Date().toISOString()})}/>;
  }

  // ─── Derived ───
  const completedKeys = Object.keys(state.curriculum).map(Number).sort((a,b)=>a-b);
  const lastCompleted = completedKeys.length > 0 ? Math.max(...completedKeys) : 0;
  const currentKey = Math.min(20, lastCompleted + 1);
  const phaseKey = phaseOf(currentKey);
  const totalDone = completedKeys.length;
  const startDate = new Date(state.startDate);
  const daysSince = Math.floor((Date.now() - startDate) / 86400000) + 1;

  const todayCompletions = state.completion.filter(c => c.dateISO === todayISO());
  const todayMirrors = state.mirrors.filter(m => m.dateISO === todayISO());
  const todayEchoes = state.echoes.filter(e => e.dateISO === todayISO());

  // ─── Mutators ───
  const completeKey = (n, note) => {
    const next = {...state, curriculum: {...state.curriculum, [n]: { completedAt: new Date().toISOString(), note: note || "" }}};
    save(next);
  };
  const addCompletion = (entry) => save({...state, completion: [{...entry, id: uid(), dateISO: todayISO()}, ...state.completion]});
  const addMirror = (entry) => save({...state, mirrors: [{...entry, id: uid(), dateISO: todayISO()}, ...state.mirrors]});
  const addEcho = (entry) => save({...state, echoes: [{...entry, id: uid(), dateISO: todayISO()}, ...state.echoes]});
  const setFear = (id, score) => {
    const cur = {...state.fears.current, [id]: score};
    const hist = [...state.fears.history, { id: uid(), dateISO: todayISO(), fear: id, score }];
    save({...state, fears: { current: cur, history: hist }});
  };

  // ─── Routes ───

  // ─── Home ───
  if (view.name === "home") {
    const today = new Date();
    const todayStr = `${today.getDate()} ${MONTHS_RU[today.getMonth()]} ${today.getFullYear()}`;

    return (
      <div style={sc}>
        <div style={{padding: `${SP.xl}px ${SP.xl}px ${SP.lg}px`, display: "flex", justifyContent: "space-between", alignItems: "flex-start"}}>
          <div style={{flex: 1, minWidth: 0}}>
            <h1 className="tbig" style={{fontSize: 52, color: C.text, margin: 0, textTransform: "uppercase", lineHeight: 0.85}}>
              МАТРИЦА
            </h1>
            <div style={{fontSize: 13, color: C.textDim, marginTop: SP.md, fontWeight: 500}}>
              {todayStr} · день {daysSince} · <span style={{color: C.accent, fontWeight: 700}}>{phaseKey.short}</span>
            </div>
          </div>
          <button onClick={() => setView({name: "settings"})} style={{
            width: 40, height: 40, borderRadius: 10, background: C.text,
            display: "flex", alignItems: "center", justifyContent: "center",
          }}>
            <Icon name="settings" size={18} color={C.bg} stroke={1.7}/>
          </button>
        </div>

        {/* Curriculum status */}
        <div style={{padding: `0 ${SP.xl}px`, marginBottom: SP.xl}}>
          <button onClick={() => setView({name: "curriculum"})} style={{
            width: "100%", textAlign: "left", padding: SP.lg,
            background: C.card, borderRadius: 14, border: `1px solid ${C.border}`,
          }}>
            <div style={{display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: SP.sm}}>
              <div style={{fontSize: 11, fontWeight: 800, letterSpacing: 1.5, color: C.accent}}>
                СЕССИЯ {currentKey > 20 ? "—" : currentKey}/20
              </div>
              <div style={{fontSize: 11, color: C.textDim, fontWeight: 700}}>
                {totalDone}/20
              </div>
            </div>
            <div className="tbig" style={{fontSize: 22, color: C.text, marginBottom: SP.xs}}>
              {currentKey > 20 ? "ПРОТОКОЛ ЗАВЕРШЁН" : `Ключ ${currentKey}: ${KEYS[currentKey-1].title}`}
            </div>
            {currentKey <= 20 && (
              <div style={{fontSize: 12, color: C.textDim, marginBottom: SP.sm}}>
                {phaseKey.name} · {phaseKey.desc}
              </div>
            )}
            <ProgressBar value={totalDone} max={20}/>
          </button>
        </div>

        {/* Quick actions grid */}
        <div style={{padding: `0 ${SP.xl}px`, display: "grid", gridTemplateColumns: "1fr 1fr", gap: SP.md, marginBottom: SP.xl}}>
          <ActionTile
            icon="flame" label="СОСТОЯНИЕ" sublabel="свершения"
            count={todayCompletions.length}
            onClick={() => setView({name: "completion"})}
          />
          <ActionTile
            icon="mirror" label="ЗЕРКАЛО" sublabel="отношений"
            count={todayMirrors.length}
            onClick={() => setView({name: "mirrors"})}
          />
          <ActionTile
            icon="eye" label="ЭХО" sublabel="отражения мира"
            count={todayEchoes.length}
            onClick={() => setView({name: "echoes"})}
          />
          <ActionTile
            icon="check" label="СТРАХИ" sublabel="три паттерна"
            count={null}
            onClick={() => setView({name: "fears"})}
          />
        </div>

        {/* Goals */}
        <div style={{padding: `0 ${SP.xl}px ${SP.xxxl}px`}}>
          <div style={{fontSize: 11, fontWeight: 800, letterSpacing: 1.5, color: C.textDim, marginBottom: SP.sm}}>
            ЦЕЛИ
          </div>
          {state.goals.map((g, i) => (
            <div key={g.id} style={{
              padding: `${SP.md}px 0`, borderBottom: `1px solid ${C.borderSoft}`,
            }}>
              <div style={{fontSize: 14, fontWeight: 700, color: C.text, marginBottom: 2}}>
                {g.text}
              </div>
              <div style={{fontSize: 12, color: C.accent, fontStyle: "italic"}}>
                Я — {g.identity}
              </div>
            </div>
          ))}
        </div>
      </div>
    );
  }

  // ─── Curriculum list ───
  if (view.name === "curriculum") {
    return (
      <div style={sc}>
        <TopBar onBack={() => setView({name: "home"})}/>
        <div style={{padding: `${SP.lg}px ${SP.xl}px 0`}}>
          <h1 className="tbig" style={{fontSize: 44, color: C.text, margin: 0, textTransform: "uppercase"}}>
            20 КЛЮЧЕЙ
          </h1>
          <div style={{fontSize: 13, color: C.textDim, marginTop: SP.sm, marginBottom: SP.xl}}>
            Брейден настаивает: проходить последовательно. Не торопись — один ключ может занять день или несколько.
          </div>
        </div>

        <div style={{padding: `0 ${SP.xl}px ${SP.xxxl}px`}}>
          {PHASES.map(phase => (
            <div key={phase.id} style={{marginBottom: SP.xl}}>
              <div style={{
                display: "flex", alignItems: "baseline", justifyContent: "space-between",
                marginBottom: SP.md, paddingBottom: SP.sm, borderBottom: `2px solid ${C.text}`,
              }}>
                <div className="tbig" style={{fontSize: 18, textTransform: "uppercase", color: C.text}}>
                  {phase.name}
                </div>
                <div style={{fontSize: 11, color: C.textDim, fontWeight: 700, letterSpacing: 1}}>
                  K{phase.keys[0]}–{phase.keys[phase.keys.length-1]}
                </div>
              </div>
              {phase.keys.map(n => {
                const k = KEYS[n-1];
                const done = state.curriculum[n];
                const locked = n > currentKey;
                const cur = n === currentKey;
                return (
                  <button key={n} onClick={() => !locked && setView({name: "session", n})}
                    disabled={locked}
                    style={{
                      width: "100%", textAlign: "left",
                      padding: `${SP.md}px 0`, borderBottom: `1px solid ${C.borderSoft}`,
                      display: "flex", alignItems: "flex-start", gap: SP.md,
                      opacity: locked ? 0.4 : 1,
                    }}>
                    <div style={{
                      width: 32, height: 32, borderRadius: 8,
                      display: "flex", alignItems: "center", justifyContent: "center",
                      background: done ? C.text : (cur ? C.accent : "transparent"),
                      border: !done && !cur ? `1.5px solid ${C.border}` : "none",
                      flexShrink: 0,
                      fontSize: 13, fontWeight: 800, color: (done || cur) ? "#FFF" : C.textDim,
                      fontVariantNumeric: "tabular-nums",
                    }}>
                      {locked ? <Icon name="lock" size={14} color={C.textDim} stroke={1.7}/> :
                       done   ? <Icon name="check" size={14} color="#FFF" stroke={3}/> : n}
                    </div>
                    <div style={{flex: 1, minWidth: 0}}>
                      <div style={{fontSize: 15, fontWeight: 700, color: C.text, lineHeight: 1.3}}>
                        {k.title}
                      </div>
                      <div style={{fontSize: 12, color: C.textDim, marginTop: 2}}>
                        {cur && !done ? "ТЕКУЩАЯ" : done ? `пройдено ${fmtDate(done.completedAt)}` : "..."}
                      </div>
                    </div>
                  </button>
                );
              })}
            </div>
          ))}
        </div>
      </div>
    );
  }

  // ─── Single session ───
  if (view.name === "session") {
    const k = KEYS[view.n - 1];
    const ph = phaseOf(view.n);
    const isDone = !!state.curriculum[view.n];
    const isCurrent = view.n === currentKey;

    return <SessionView
      k={k} ph={ph} isDone={isDone} isCurrent={isCurrent}
      onBack={() => setView({name: "curriculum"})}
      onComplete={(note) => { completeKey(view.n, note); setView({name: "home"}); }}
    />;
  }

  // ─── Completion practice ───
  if (view.name === "completion") {
    return <CompletionView
      goals={state.goals}
      onBack={() => setView({name: "home"})}
      onSave={(entry) => { addCompletion(entry); setView({name: "home"}); }}
    />;
  }

  // ─── Mirrors list ───
  if (view.name === "mirrors") {
    return <MirrorsList
      mirrors={state.mirrors}
      onBack={() => setView({name: "home"})}
      onNew={() => setView({name: "mirror-new"})}
      onOpen={(m) => setView({name: "mirror-view", m})}
    />;
  }
  if (view.name === "mirror-new") {
    return <MirrorNew
      onBack={() => setView({name: "mirrors"})}
      onSave={(entry) => { addMirror(entry); setView({name: "mirrors"}); }}
    />;
  }
  if (view.name === "mirror-view") {
    return <MirrorRead m={view.m} onBack={() => setView({name: "mirrors"})}/>;
  }

  // ─── Fears ───
  if (view.name === "fears") {
    return <FearsView
      fears={state.fears}
      onBack={() => setView({name: "home"})}
      onSet={setFear}
    />;
  }

  // ─── Echoes ───
  if (view.name === "echoes") {
    return <EchoesView
      echoes={state.echoes}
      goals={state.goals}
      onBack={() => setView({name: "home"})}
      onAdd={addEcho}
    />;
  }

  // ─── Settings ───
  if (view.name === "settings") {
    return <SettingsView
      state={state}
      onBack={() => setView({name: "home"})}
      onImport={(s) => save(s)}
      onReset={() => { localStorage.removeItem(STORAGE_KEY); save(defaultState()); setView({name: "home"}); }}
    />;
  }

  return null;
}

// ═══ COMPLETION (state of completion) ═══════════════════════════════════════
const PHASE_NAMES = ["Сострадание", "Сценарий", "Чувство", "Лог"];
const PHASE_DURATIONS = [60, 120, 300, 0]; // sec; last phase has no timer

function CompletionView({ goals, onBack, onSave }) {
  const [step, setStep] = useState(0); // 0=goal pick, 1-4=phases
  const [goalId, setGoalId] = useState(goals[0]?.id);
  const [phase, setPhase] = useState(0); // 0..3
  const [running, setRunning] = useState(false);
  const [secLeft, setSecLeft] = useState(PHASE_DURATIONS[0]);
  const [clarity, setClarity] = useState(7);
  const [charge, setCharge] = useState(7);
  const [body, setBody] = useState("");
  const [attached, setAttached] = useState(3);
  const [totalSec, setTotalSec] = useState(0);

  const goal = goals.find(g => g.id === goalId);

  useEffect(() => {
    if (!running || step !== 1) return;
    const t = setInterval(() => {
      setSecLeft(s => {
        setTotalSec(ts => ts + 1);
        if (s <= 1) {
          // advance phase
          if (phase < 2) {
            setPhase(p => p + 1);
            return PHASE_DURATIONS[phase + 1];
          } else {
            setRunning(false);
            setStep(2); // log
            return 0;
          }
        }
        return s - 1;
      });
    }, 1000);
    return () => clearInterval(t);
  }, [running, phase, step]);

  const startSession = () => {
    setStep(1);
    setPhase(0);
    setSecLeft(PHASE_DURATIONS[0]);
    setRunning(true);
  };

  const skipPhase = () => {
    if (phase < 2) {
      setPhase(p => p + 1);
      setSecLeft(PHASE_DURATIONS[phase + 1]);
    } else {
      setRunning(false);
      setStep(2);
    }
  };

  // Goal pick
  if (step === 0) {
    return (
      <div style={sc}>
        <TopBar onBack={onBack}/>
        <div style={{padding: `${SP.lg}px ${SP.xl}px ${SP.xxxl}px`, maxWidth: 480, margin: "0 auto"}}>
          <h1 className="tbig" style={{fontSize: 36, marginBottom: SP.sm, color: C.text, textTransform: "uppercase"}}>
            Состояние свершения
          </h1>
          <div style={{fontSize: 13, color: C.textDim, marginBottom: SP.xl, lineHeight: 1.5}}>
            Цикл из 4 фаз: сострадание → сценарий → чувство → лог. Всего 8–10 минут. Найди тихое место.
          </div>

          <div style={{fontSize: 11, fontWeight: 800, letterSpacing: 1.5, color: C.accent, marginBottom: SP.sm}}>
            ЦЕЛЬ ДЛЯ ЭТОГО ЦИКЛА
          </div>
          {goals.map(g => (
            <button key={g.id} onClick={() => setGoalId(g.id)} style={{
              width: "100%", textAlign: "left", padding: SP.md, marginBottom: SP.sm,
              background: goalId === g.id ? C.accentSoft : C.card,
              border: `1.5px solid ${goalId === g.id ? C.accent : C.border}`,
              borderRadius: 10,
            }}>
              <div style={{fontSize: 14, fontWeight: 700, color: C.text}}>{g.text}</div>
              <div style={{fontSize: 12, color: C.accent, fontStyle: "italic", marginTop: 2}}>Я — {g.identity}</div>
            </button>
          ))}

          <div style={{marginTop: SP.xl}}>
            <Btn onClick={startSession} variant="accent" full disabled={!goalId}>
              Начать цикл
            </Btn>
          </div>
        </div>
      </div>
    );
  }

  // Timed phases
  if (step === 1) {
    const phaseTexts = [
      // 0 — Compassion anchor
      <div>
        <div style={{fontSize: 14, color: C.textDim, marginBottom: SP.sm, lineHeight: 1.5}}>Тибетский монах: сострадание — творящая сила.</div>
        <div style={{fontSize: 17, color: C.text, lineHeight: 1.5}}>Сделай 5 медленных вдохов. На вдохе — благодарность за то, что уже есть. На выдохе — расслабление лица и плеч.</div>
      </div>,
      // 1 — Scenario
      <div>
        <div style={{fontSize: 14, color: C.textDim, marginBottom: SP.sm, lineHeight: 1.5}}>Произнеси про себя в настоящем времени, как уже свершившееся:</div>
        <div className="quote" style={{fontSize: 19, color: C.text, marginTop: SP.md, lineHeight: 1.5}}>
          {goal?.text}
        </div>
        <div style={{fontSize: 14, color: C.accent, fontStyle: "italic", marginTop: SP.md}}>
          Я — {goal?.identity}
        </div>
      </div>,
      // 2 — Feeling
      <div>
        <div style={{fontSize: 14, color: C.textDim, marginBottom: SP.sm, lineHeight: 1.5}}>Закрой глаза. Без слов.</div>
        <div style={{fontSize: 17, color: C.text, lineHeight: 1.5}}>Просто чувство, что это уже так. Благодарность, а не просьба. Не пытайся «сильнее» — это только эго. Если ум ушёл — мягко вернись.</div>
      </div>,
    ][phase];

    const mm = Math.floor(secLeft / 60);
    const ss = secLeft % 60;

    return (
      <div style={{...sc, display: "flex", flexDirection: "column"}}>
        <TopBar onBack={() => { setRunning(false); setStep(0); }} title={`ФАЗА ${phase+1}/3`}/>

        <div style={{flex: 1, display: "flex", flexDirection: "column", justifyContent: "center", padding: SP.xl, maxWidth: 480, margin: "0 auto", width: "100%"}}>
          <div style={{fontSize: 11, fontWeight: 800, letterSpacing: 2, color: C.accent, marginBottom: SP.md}}>
            {PHASE_NAMES[phase]}
          </div>

          <div style={{minHeight: 240}}>
            {phaseTexts}
          </div>

          <div style={{marginTop: SP.xxl}}>
            <div className="tbig" style={{fontSize: 64, color: C.text, fontVariantNumeric: "tabular-nums", textAlign: "center"}}>
              {String(mm).padStart(2,"0")}:{String(ss).padStart(2,"0")}
            </div>

            <div style={{display: "flex", gap: SP.md, marginTop: SP.lg, alignItems: "center"}}>
              <div style={{flex: 1}}>
                <ProgressBar value={PHASE_DURATIONS[phase] - secLeft} max={PHASE_DURATIONS[phase]}/>
              </div>
              <button onClick={() => setRunning(r => !r)} style={{
                width: 48, height: 48, borderRadius: "50%", background: C.text,
                display: "flex", alignItems: "center", justifyContent: "center",
              }}>
                <Icon name={running ? "pause" : "play"} size={18} color={C.bg} stroke={2.5}/>
              </button>
            </div>

            <button onClick={skipPhase} style={{
              marginTop: SP.lg, width: "100%", padding: SP.sm,
              fontSize: 12, color: C.textDim, fontWeight: 700, letterSpacing: 1, textTransform: "uppercase",
            }}>
              {phase < 2 ? "Следующая фаза →" : "К логу →"}
            </button>
          </div>
        </div>
      </div>
    );
  }

  // Log
  if (step === 2) {
    return (
      <div style={sc}>
        <TopBar onBack={() => setStep(0)} title="ЛОГ"/>
        <div style={{padding: `${SP.lg}px ${SP.xl}px ${SP.xxxl}px`, maxWidth: 480, margin: "0 auto"}}>
          <div style={{fontSize: 11, fontWeight: 800, letterSpacing: 2, color: C.accent, marginBottom: SP.sm}}>
            ФАЗА 4/4 · ФИКСАЦИЯ
          </div>
          <h1 className="tbig" style={{fontSize: 28, marginBottom: SP.xl, color: C.text}}>
            Что было?
          </h1>

          <SliderField label="Ясность чувства" value={clarity} onChange={setClarity} hint="0=пусто, 10=ярче реального"/>
          <SliderField label="Эмоциональный заряд" value={charge} onChange={setCharge} hint="0=плоско, 10=мощно"/>
          <SliderField label="Привязка к результату" value={attached} onChange={setAttached} hint="0=без привязки (Ключ 10), 10=жажда" inverted/>

          <div style={{marginTop: SP.xl}}>
            <div style={{fontSize: 11, fontWeight: 800, letterSpacing: 1.5, color: C.textDim, marginBottom: SP.sm}}>
              ТЕЛЕСНОЕ ОЩУЩЕНИЕ (опционально)
            </div>
            <textarea
              value={body} onChange={e => setBody(e.target.value)}
              placeholder="Где в теле? Тепло, лёгкость, дрожь, расширение..."
              rows={3}
              style={{
                width: "100%", padding: SP.md, border: `1px solid ${C.border}`,
                borderRadius: 8, fontSize: 14, background: C.card, outline: "none",
              }}
            />
          </div>

          <div style={{marginTop: SP.xl}}>
            <Btn onClick={() => onSave({ goalId, durationSec: totalSec, clarity, charge, body, attached })} variant="accent" full>
              Сохранить
            </Btn>
          </div>
        </div>
      </div>
    );
  }

  return null;
}

function SliderField({ label, value, onChange, hint, inverted }) {
  return (
    <div style={{marginBottom: SP.lg}}>
      <div style={{display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: SP.sm}}>
        <div style={{fontSize: 13, fontWeight: 700, color: C.text}}>{label}</div>
        <div className="tbig" style={{fontSize: 22, color: inverted ? (value > 5 ? C.alert : C.accent) : C.accent, fontVariantNumeric: "tabular-nums"}}>
          {value}
        </div>
      </div>
      <input type="range" min="0" max="10" value={value} onChange={e => onChange(+e.target.value)} style={{width: "100%"}}/>
      {hint && <div style={{fontSize: 11, color: C.textSoft, marginTop: 4}}>{hint}</div>}
    </div>
  );
}

          ЗЕРКАЛО

      <div style={{padding: `0 ${SP.xl}px`}}>

        ) : mirrors.map(m => (
          <button key={m.id} onClick={() => onOpen(m)} style={{
            width: "100%", textAlign: "left",
            padding: `${SP.md}px 0`, borderBottom: `1px solid ${C.borderSoft}`,
          }}>
            <div style={{fontSize: 11, color: C.textDim, fontWeight: 700, letterSpacing: 0.5}}>
              {fmtDate(m.dateISO)}
            </div>
            <div style={{fontSize: 14, color: C.text, fontWeight: 600, marginTop: 2, lineHeight: 1.4,
              overflow: "hidden", display: "-webkit-box", WebkitLineClamp: 2, WebkitBoxOrient: "vertical"}}>
              {m.situation}
            </div>
            <div style={{fontSize: 11, color: C.accent, marginTop: 4, fontWeight: 700}}>
              {[1,2,3,4,5].filter(i => m[`m${i}`]?.trim()).length} зеркал отзвалось
            </div>
          </button>
        ))}
      </div>
    </div>
  );
}

function MirrorNew({ onBack, onSave }) {
  const [step, setStep] = useState(0);
  const [data, setData] = useState({ situation: "", m1: "", m2: "", m3: "", m4: "", m5: "" });

  if (step === 0) {
    return (
      <div style={sc}>
        <TopBar onBack={onBack} title="СИТУАЦИЯ"/>
        <div style={{padding: `${SP.lg}px ${SP.xl}px ${SP.xxxl}px`, maxWidth: 480, margin: "0 auto"}}>
          <h1 className="tbig" style={{fontSize: 28, marginBottom: SP.sm, color: C.text}}>
            Что произошло?
          </h1>
          <div style={{fontSize: 13, color: C.textDim, marginBottom: SP.lg, lineHeight: 1.5}}>
            Конкретный эпизод, человек, разговор, реакция — то, что зацепило. 1–3 предложения.
          </div>
          <textarea
            value={data.situation} onChange={e => setData({...data, situation: e.target.value})}
            placeholder="Например: на встрече коллега резко перебил, и я закрылся..."
            rows={6} autoFocus
            style={{
              width: "100%", padding: SP.md, border: `1px solid ${C.border}`,
              borderRadius: 8, fontSize: 15, background: C.card, outline: "none", marginBottom: SP.xl,
            }}
          />
          <Btn onClick={() => setStep(1)} variant="accent" full disabled={!data.situation.trim()}>
            Дальше
          </Btn>
        </div>
      </div>
    );
  }

  // Steps 1..5 — one mirror per step
  const mirror = MIRRORS[step - 1];
  const fieldKey = `m${step}`;

  return (
    <div style={sc}>
      <TopBar onBack={() => setStep(step - 1)} title={`ЗЕРКАЛО ${step}/5`}/>
      <div style={{padding: `${SP.lg}px ${SP.xl}px ${SP.xxxl}px`, maxWidth: 480, margin: "0 auto"}}>
        <div style={{fontSize: 11, fontWeight: 800, letterSpacing: 2, color: C.accent, marginBottom: SP.sm}}>
          ЗЕРКАЛО {mirror.n} · {mirror.name.toUpperCase()}
        </div>
        <h2 className="tbig" style={{fontSize: 24, marginBottom: SP.sm, color: C.text, lineHeight: 1.2}}>
          {mirror.q}
        </h2>
        <div style={{fontSize: 13, color: C.textDim, marginBottom: SP.lg, lineHeight: 1.5, fontStyle: "italic"}}>
          {mirror.hint}
        </div>

        <div style={{padding: SP.md, background: C.card, borderRadius: 8, marginBottom: SP.lg, fontSize: 13, color: C.textDim, border: `1px solid ${C.borderSoft}`}}>
          <b style={{color: C.text}}>Ситуация:</b> {data.situation}
        </div>

        <textarea
          value={data[fieldKey]} onChange={e => setData({...data, [fieldKey]: e.target.value})}
          placeholder="Если не отзывается — оставь пусто и пропусти"
          rows={5}
          style={{
            width: "100%", padding: SP.md, border: `1px solid ${C.border}`,
            borderRadius: 8, fontSize: 14, background: C.card, outline: "none", marginBottom: SP.xl,
          }}
        />

        {step < 5 ? (
          <Btn onClick={() => setStep(step + 1)} variant="accent" full>
            {data[fieldKey].trim() ? "Дальше" : "Пропустить →"}
          </Btn>
        ) : (
          <Btn onClick={() => onSave(data)} variant="accent" full>
            Сохранить
          </Btn>
        )}
      </div>
    </div>
  );
}

function MirrorRead({ m, onBack }) {
  return (
    <div style={sc}>
      <TopBar onBack={onBack}/>
      <div style={{padding: `${SP.lg}px ${SP.xl}px ${SP.xxxl}px`, maxWidth: 580, margin: "0 auto"}}>
        <div style={{fontSize: 11, color: C.textDim, fontWeight: 700, letterSpacing: 0.5, marginBottom: SP.sm}}>
          {fmtDate(m.dateISO)}
        </div>
        <h1 className="tbig" style={{fontSize: 22, marginBottom: SP.xl, color: C.text, lineHeight: 1.3}}>
          {m.situation}
        </h1>

        {MIRRORS.map(mr => {
          const v = m[`m${mr.n}`];
          if (!v?.trim()) return null;
          return (
            <div key={mr.n} style={{marginBottom: SP.xl}}>
              <div style={{fontSize: 11, fontWeight: 800, letterSpacing: 1.5, color: C.accent, marginBottom: SP.xs}}>
                ЗЕРКАЛО {mr.n} · {mr.name.toUpperCase()}
              </div>
              <div style={{fontSize: 13, color: C.textDim, fontStyle: "italic", marginBottom: SP.sm}}>
                {mr.q}
              </div>
              <div style={{fontSize: 15, color: C.text, lineHeight: 1.5,
                padding: SP.md, background: C.card, borderRadius: 8, border: `1px solid ${C.borderSoft}`}}>
                {v}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ═══ FEARS ═══════════════════════════════════════════════════════════════════
function FearsView({ fears, onBack, onSet }) {
  const [open, setOpen] = useState(null);

  return (
    <div style={sc}>
      <TopBar onBack={onBack}/>
      <div style={{padding: `${SP.lg}px ${SP.xl}px 0`}}>
        <h1 className="tbig" style={{fontSize: 44, color: C.text, margin: 0, textTransform: "uppercase"}}>
          СТРАХИ
        </h1>
        <div style={{fontSize: 13, color: C.textDim, marginTop: SP.sm, marginBottom: SP.xl, lineHeight: 1.5}}>
          Брейден (Ключ 18): все негативные переживания сводятся к этим трём паттернам или их комбинации.
        </div>
      </div>

      <div style={{padding: `0 ${SP.xl}px ${SP.xxxl}px`}}>
        {FEARS.map(f => {
          const cur = fears.current[f.id];
          const isOpen = open === f.id;
          const hist = fears.history.filter(h => h.fear === f.id).slice(-7);
          return (
            <div key={f.id} style={{
              background: C.card, borderRadius: 12,
              border: `1px solid ${C.border}`, marginBottom: SP.md, overflow: "hidden",
            }}>
              <button onClick={() => setOpen(isOpen ? null : f.id)} style={{
                width: "100%", textAlign: "left", padding: SP.lg,
                display: "flex", alignItems: "center", justifyContent: "space-between", gap: SP.md,
              }}>
                <div style={{flex: 1}}>
                  <div style={{fontSize: 16, fontWeight: 800, color: C.text}}>{f.name}</div>
                  <div style={{fontSize: 12, color: C.textDim, marginTop: 2}}>{f.desc}</div>
                </div>
                <div className="tbig" style={{fontSize: 32,
                  color: cur >= 7 ? C.alert : cur >= 4 ? C.accent : C.warm,
                  fontVariantNumeric: "tabular-nums"}}>
                  {cur}
                </div>
              </button>

              {isOpen && (
                <div style={{padding: `0 ${SP.lg}px ${SP.lg}px`, borderTop: `1px solid ${C.borderSoft}`}}>
                  <div style={{fontSize: 11, fontWeight: 800, letterSpacing: 1.5, color: C.textDim, marginTop: SP.md, marginBottom: SP.sm}}>
                    ПАТТЕРНЫ ИЗ КНИГИ
                  </div>
                  <ul style={{paddingLeft: 18, fontSize: 13, color: C.text, lineHeight: 1.6}}>
                    {f.patterns.map((p, i) => <li key={i} style={{marginBottom: 4}}>{p}</li>)}
                  </ul>

                  <div style={{marginTop: SP.lg}}>
                    <SliderField label="Где я сейчас" value={cur} onChange={(v) => onSet(f.id, v)} hint="0 = страх не активен, 10 = доминирует"/>
                  </div>

                  {hist.length > 0 && (
                    <div style={{marginTop: SP.md}}>
                      <div style={{fontSize: 11, fontWeight: 800, letterSpacing: 1.5, color: C.textDim, marginBottom: SP.sm}}>
                        ПОСЛЕДНИЕ {hist.length}
                      </div>
                      <div style={{display: "flex", gap: 4, alignItems: "flex-end", height: 40}}>
                        {hist.map(h => (
                          <div key={h.id} style={{
                            flex: 1, height: `${h.score * 10}%`,
                            background: h.score >= 7 ? C.alert : h.score >= 4 ? C.accent : C.warm,
                            borderRadius: 2, minHeight: 3,
                          }} title={`${fmtDate(h.dateISO)}: ${h.score}`}/>
                        ))}
                      </div>
                    </div>
                  )}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ═══ ECHOES ══════════════════════════════════════════════════════════════════
function EchoesView({ echoes, goals, onBack, onAdd }) {
  const [event, setEvent] = useState("");
  const [reflection, setReflection] = useState("");
  const [goalId, setGoalId] = useState("");

  const submit = () => {
    if (!event.trim()) return;
    onAdd({ event, reflection, goalId: goalId || null });
    setEvent(""); setReflection(""); setGoalId("");
  };

  return (
    <div style={sc}>
      <TopBar onBack={onBack}/>
      <div style={{padding: `${SP.lg}px ${SP.xl}px 0`}}>
        <h1 className="tbig" style={{fontSize: 44, color: C.text, margin: 0, textTransform: "uppercase"}}>
          ЭХО
        </h1>
        <div style={{fontSize: 13, color: C.textDim, marginTop: SP.sm, marginBottom: SP.xl, lineHeight: 1.5}}>
          Ключ 17: матрица отражает чувства в события. Лог совпадений, странных встреч, подтверждений и опровержений.
        </div>
      </div>

      <div style={{padding: `0 ${SP.xl}px`, marginBottom: SP.xl}}>
        <div style={{padding: SP.lg, background: C.card, borderRadius: 12, border: `1px solid ${C.border}`}}>
          <div style={{fontSize: 11, fontWeight: 800, letterSpacing: 1.5, color: C.accent, marginBottom: SP.xs}}>
            ЧТО ПРОИЗОШЛО
          </div>
          <textarea
            value={event} onChange={e => setEvent(e.target.value)}
            placeholder="Внешнее событие — кратко"
            rows={2}
            style={{
              width: "100%", padding: SP.sm, border: `1px solid ${C.border}`,
              borderRadius: 6, fontSize: 14, background: C.bg, outline: "none", marginBottom: SP.md,
            }}
          />
          <div style={{fontSize: 11, fontWeight: 800, letterSpacing: 1.5, color: C.accent, marginBottom: SP.xs}}>
            ЧТО ОТЗЕРКАЛИЛО
          </div>
          <textarea
            value={reflection} onChange={e => setReflection(e.target.value)}
            placeholder="Какое моё внутреннее состояние / убеждение это отражает (опционально)"
            rows={2}
            style={{
              width: "100%", padding: SP.sm, border: `1px solid ${C.border}`,
              borderRadius: 6, fontSize: 14, background: C.bg, outline: "none", marginBottom: SP.md,
            }}
          />
          {goals.length > 0 && (
            <>
              <div style={{fontSize: 11, fontWeight: 800, letterSpacing: 1.5, color: C.textDim, marginBottom: SP.xs}}>
                ПРИВЯЗКА К ЦЕЛИ (необязательно)
              </div>
              <div style={{display: "flex", gap: 4, flexWrap: "wrap", marginBottom: SP.md}}>
                <button onClick={() => setGoalId("")} style={{
                  padding: "5px 10px", fontSize: 12, fontWeight: 700,
                  background: !goalId ? C.text : "transparent", color: !goalId ? C.bg : C.textDim,
                  border: `1px solid ${!goalId ? C.text : C.border}`, borderRadius: 14,
                }}>—</button>
                {goals.map((g, i) => (
                  <button key={g.id} onClick={() => setGoalId(g.id)} style={{
                    padding: "5px 10px", fontSize: 12, fontWeight: 700,
                    background: goalId === g.id ? C.accent : "transparent",
                    color: goalId === g.id ? "#FFF" : C.textDim,
                    border: `1px solid ${goalId === g.id ? C.accent : C.border}`, borderRadius: 14,
                  }}>цель {i+1}</button>
                ))}
              </div>
            </>
          )}
          <Btn onClick={submit} variant="primary" full disabled={!event.trim()}>
            Зафиксировать
          </Btn>
        </div>
      </div>

      <div style={{padding: `0 ${SP.xl}px ${SP.xxxl}px`}}>
        {echoes.length === 0 ? (
          <div style={{padding: SP.xl, textAlign: "center", color: C.textDim, fontSize: 13}}>
            Лог пуст. Замечай мелкие отражения — они и есть язык матрицы.
          </div>
        ) : echoes.map(e => {
          const goal = goals.find(g => g.id === e.goalId);
          return (
            <div key={e.id} style={{
              padding: `${SP.md}px 0`, borderBottom: `1px solid ${C.borderSoft}`,
            }}>
              <div style={{fontSize: 11, color: C.textDim, fontWeight: 700, letterSpacing: 0.5, display: "flex", gap: SP.sm}}>
                <span>{fmtDate(e.dateISO)}</span>
                {goal && <span style={{color: C.accent}}>· цель: {goal.text.slice(0, 30)}{goal.text.length > 30 ? "…" : ""}</span>}
              </div>
              <div style={{fontSize: 14, color: C.text, marginTop: 4, lineHeight: 1.4}}>
                {e.event}
              </div>
              {e.reflection && (
                <div style={{fontSize: 13, color: C.accent, marginTop: 4, lineHeight: 1.4, fontStyle: "italic"}}>
                  → {e.reflection}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ═══ SETTINGS ════════════════════════════════════════════════════════════════
function SettingsView({ state, onBack, onImport, onReset }) {
  const fileRef = useRef();

  const exportJSON = () => {
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `matrix-protocol-${todayISO()}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  const importJSON = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const parsed = JSON.parse(reader.result);
        if (parsed && typeof parsed === "object" && "v" in parsed) {
          if (confirm("Заменить текущие данные импортированными? Это нельзя отменить.")) {
            onImport(parsed);
          }
        } else {
          alert("Файл не похож на бэкап matrix-protocol.");
        }
      } catch {
        alert("Не удалось разобрать файл.");
      }
    };
    reader.readAsText(file);
  };

  const reset = () => {
    if (confirm("Стереть все данные? Восстановить будет нельзя — экспортируй сначала.")) {
      if (confirm("Точно? Это последнее предупреждение.")) {
        onReset();
      }
    }
  };

  return (
    <div style={sc}>
      <TopBar onBack={onBack}/>
      <div style={{padding: `${SP.lg}px ${SP.xl}px ${SP.xxxl}px`, maxWidth: 480, margin: "0 auto"}}>
        <h1 className="tbig" style={{fontSize: 44, color: C.text, margin: 0, textTransform: "uppercase", marginBottom: SP.xl}}>
          НАСТРОЙКИ
        </h1>

        <div style={{marginBottom: SP.xl}}>
          <div style={{fontSize: 11, fontWeight: 800, letterSpacing: 1.5, color: C.textDim, marginBottom: SP.md}}>
            ДАННЫЕ
          </div>
          <button onClick={exportJSON} style={{
            width: "100%", padding: SP.md,
            background: C.card, border: `1px solid ${C.border}`, borderRadius: 10,
            display: "flex", alignItems: "center", gap: SP.md, marginBottom: SP.sm,
          }}>
            <Icon name="download" size={18} color={C.text}/>
            <div style={{fontSize: 14, fontWeight: 700, color: C.text}}>Экспорт JSON</div>
          </button>

          <button onClick={() => fileRef.current?.click()} style={{
            width: "100%", padding: SP.md,
            background: C.card, border: `1px solid ${C.border}`, borderRadius: 10,
            display: "flex", alignItems: "center", gap: SP.md, marginBottom: SP.sm,
          }}>
            <Icon name="upload" size={18} color={C.text}/>
            <div style={{fontSize: 14, fontWeight: 700, color: C.text}}>Импорт JSON</div>
          </button>
          <input ref={fileRef} type="file" accept="application/json" onChange={importJSON} style={{display: "none"}}/>

          <button onClick={reset} style={{
            width: "100%", padding: SP.md,
            background: C.card, border: `1px solid ${C.alert}`, borderRadius: 10,
            display: "flex", alignItems: "center", gap: SP.md,
          }}>
            <Icon name="trash" size={18} color={C.alert}/>
            <div style={{fontSize: 14, fontWeight: 700, color: C.alert}}>Сбросить всё</div>
          </button>
        </div>

        <div style={{marginBottom: SP.xl}}>
          <div style={{fontSize: 11, fontWeight: 800, letterSpacing: 1.5, color: C.textDim, marginBottom: SP.md}}>
            СТАТИСТИКА
          </div>
          <Stat label="Дней с начала" value={Math.floor((Date.now() - new Date(state.startDate)) / 86400000) + 1}/>
          <Stat label="Ключей пройдено" value={`${Object.keys(state.curriculum).length}/20`}/>
          <Stat label="Циклов «Свершения»" value={state.completion.length}/>
          <Stat label="Записей в Зеркале" value={state.mirrors.length}/>
          <Stat label="Записей в Эхо" value={state.echoes.length}/>
        </div>

        <div style={{
          padding: SP.lg, background: C.accentSoft, borderRadius: 10,
          fontSize: 12, color: C.text, lineHeight: 1.5,
        }}>
          <b style={{color: C.accent, fontSize: 11, letterSpacing: 1.5, textTransform: "uppercase", display: "block", marginBottom: 4}}>
            Напоминание
          </b>
          Это псевдонаучная рамка. Работает не «материализация», а структурированная работа с убеждениями и эмоциями. Внешние результаты — следствие изменения поведения, не «настройки поля».
        </div>
      </div>
    </div>
  );
}

function Stat({ label, value }) {
  return (
    <div style={{
      display: "flex", justifyContent: "space-between",
      padding: `${SP.sm}px 0`, borderBottom: `1px solid ${C.borderSoft}`,
    }}>
      <div style={{fontSize: 13, color: C.textDim}}>{label}</div>
      <div style={{fontSize: 13, fontWeight: 700, color: C.text, fontVariantNumeric: "tabular-nums"}}>{value}</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
